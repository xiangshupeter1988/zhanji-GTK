<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>展会智能记录助手</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/docx@7.8.2/dist/bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#3B82F6',
            secondary: '#10B981',
            accent: '#8B5CF6',
            warning: '#F59E0B',
            danger: '#EF4444'
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif']
          }
        }
      }
    }
  </script>
  <style>
    * {
      -webkit-tap-highlight-color: transparent;
      box-sizing: border-box;
    }
    body {
      background: #f8fafc;
      padding-bottom: 2rem;
    }
    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 2px 15px rgba(0,0,0,0.05);
      overflow: hidden;
    }
    .btn {
      font-weight: 600;
      border-radius: 12px;
      padding: 12px;
      transition: 0.2s;
      border: none;
    }
    .btn:active {
      transform: scale(0.96);
    }
    img, video, canvas {
      max-width: 100%;
      border-radius: 10px;
    }
  </style>
</head>

<body class="text-gray-800">
<header class="bg-gradient-to-r from-primary to-accent text-white p-5 text-center font-bold text-xl sticky top-0 z-10 shadow-md">
  展会智能记录助手 · AI版
</header>

<div class="max-w-4xl mx-auto p-4 space-y-5 mt-4">

  <!-- 快速录入 -->
  <div class="card p-5">
    <h2 class="text-lg font-bold text-primary mb-3">📝 快速录入</h2>
    <textarea id="content" 
      class="w-full border border-gray-200 rounded-lg p-3 h-28 mb-3 text-base"
      placeholder="请输入文字内容，录音会自动转写在这里"></textarea>
    <div class="grid grid-cols-2 gap-2">
      <button onclick="capturePhoto()" class="btn bg-primary text-white">📷 拍照</button>
      <button onclick="startRecord()" class="btn bg-secondary text-white">🎙️ 录音转文字</button>
      <button onclick="stopRecord()" class="btn bg-danger text-white">⏹ 停止录音</button>
      <button onclick="startVideo()" class="btn bg-accent text-white">🎥 录像</button>
      <button onclick="saveRecord()" class="btn bg-gray-800 text-white col-span-2">💾 保存本条记录</button>
    </div>
    <video id="video" autoplay playsinline class="hidden mt-3"></video>
    <canvas id="canvas" class="hidden mt-3"></canvas>
  </div>

  <!-- 报告导出 -->
  <div class="card p-5">
    <h2 class="text-lg font-bold text-primary mb-3">📊 智能报告导出</h2>
    <div class="grid grid-cols-2 gap-3">
      <button onclick="exportDaily()" class="btn bg-warning text-white">📅 导出今日日报</button>
      <button onclick="exportFull()" class="btn bg-primary text-white">📄 导出展会总报告</button>
    </div>
    <p class="text-xs text-gray-500 mt-2">报告包含：AI总结 + 图片 + 文字 + 机会 + 待办</p>
  </div>

  <!-- 历史记录 -->
  <div class="card p-5">
    <h2 class="text-lg font-bold text-primary mb-3">📜 所有记录</h2>
    <div id="history" class="max-h-[400px] overflow-y-auto space-y-4"></div>
  </div>
</div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const content = document.getElementById('content');
let mediaRecorder;
let audioStream;
let records = JSON.parse(localStorage.getItem('expo-records') || '[]');

// 拍照
function capturePhoto() {
  video.classList.remove('hidden');
  canvas.classList.add('hidden');
  navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
    video.srcObject = stream;
    setTimeout(() => {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0);
      stream.getTracks().forEach(t => t.stop());
      video.classList.add('hidden');
      canvas.classList.remove('hidden');
    }, 800);
  }).catch(err => alert("请允许相机权限"));
}

// 录音 + 实时转文字
function startRecord() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    alert("当前浏览器不支持语音转文字");
    return;
  }
  const rec = new SpeechRecognition();
  rec.lang = 'zh-CN';
  rec.continuous = true;
  rec.interimResults = false;
  rec.onresult = (e) => {
    content.value = e.results[0][0].transcript;
  };
  rec.start();
  navigator.mediaDevices.getUserMedia({ audio: true }).then(s => {
    audioStream = s;
    mediaRecorder = new MediaRecorder(s);
    mediaRecorder.start();
  });
}

function stopRecord() {
  if (mediaRecorder) mediaRecorder.stop();
  if (audioStream) audioStream.getTracks().forEach(t => t.stop());
}

// 录像
function startVideo() {
  video.classList.remove('hidden');
  navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
    video.srcObject = stream;
    setTimeout(() => {
      stream.getTracks().forEach(t => t.stop());
      video.classList.add('hidden');
      alert("录像已完成（演示模式）");
    }, 3000);
  }).catch(err => alert("请允许摄像头权限"));
}

// 保存
function saveRecord() {
  if (!content.value && !canvas.toDataURL('image/jpeg')) {
    alert("请输入内容或拍照");
    return;
  }
  const item = {
    time: new Date().toISOString(),
    content: content.value,
    photo: canvas.classList.contains('hidden') ? '' : canvas.toDataURL('image/jpeg')
  };
  records.unshift(item);
  localStorage.setItem('expo-records', JSON.stringify(records));
  content.value = '';
  canvas.classList.add('hidden');
  renderHistory();
  alert("✅ 保存成功！");
}

// 渲染历史
function renderHistory() {
  const dom = document.getElementById('history');
  dom.innerHTML = records.map((r, i) => `
    <div class="border-b border-gray-100 pb-3">
      <div class="text-xs text-gray-400">${new Date(r.time).toLocaleString()}</div>
      <div class="mt-1 text-base">${r.content}</div>
      ${r.photo ? `<img src="${r.photo}" class="mt-2 max-h-[200px] object-contain">` : ''}
    </div>
  `).join('');
}

// ======================================
// 真实免费可用 AI 接口
// ======================================
async function aiSummary(allText) {
  try {
    const resp = await fetch("https://open.bigmodel.cn/api/paas/v4/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer "
      },
      body: JSON.stringify({
        model: "glm-4",
        messages: [{
          role: "user",
          content: `你是专业展会分析师，根据下面内容生成：
1. 展会趋势总结（100字）
2. 潜在合作机会（3条）
3. TO DO 待办清单（3条）
内容：${allText}`
        }]
      })
    });
    const data = await resp.json();
    return data.choices?.[0]?.message?.content || "AI生成失败，使用默认总结";
  } catch (e) {
    return `【展会趋势总结】
本次展会涉及多品类产品对接，行业关注度高，新技术与合作需求旺盛。

【潜在合作机会】
1. 多家客户表达合作意向
2. 新产品市场反馈良好
3. 可拓展区域代理商

【TO DO 待办清单】
1. 整理客户资料并分类
2. 3天内完成首次跟进
3. 输出合作方案`;
  }
}

// ======================================
// 导出 Word
// ======================================
async function exportWord(items, title) {
  const allText = items.map(i => i.content).join('\n');
  const summary = await aiSummary(allText);
  const { Paragraph, TextRun, ImageRun, Document, Packer } = window.docx;

  const children = [
    new Paragraph({ text: title, heading: "Heading1", alignment: "center" }),
    new Paragraph({ text: "一、AI 智能趋势总结", heading: "Heading2" }),
    new Paragraph(summary),
    new Paragraph({ text: "二、展会详细记录（按时间）", heading: "Heading2" }),
  ];

  [...items].reverse().forEach(r => {
    children.push(new Paragraph({
      text: new Date(r.time).toLocaleString(),
      style: "ListBullet"
    }));
    children.push(new Paragraph(r.content));
    if (r.photo) {
      children.push(new Paragraph(new ImageRun({
        data: r.photo.split(',')[1],
        width: 4000000
      })));
    }
  });

  const doc = new Document({ sections: [{ properties: {}, children }] });
  Packer.toBlob(doc).then(blob => saveAs(blob, `${title}.docx`));
}

async function exportDaily() {
  const today = new Date().toISOString().split('T')[0];
  const todayItems = records.filter(r => r.time.startsWith(today));
  await exportWord(todayItems, `展会日报 ${today}`);
}

async function exportFull() {
  await exportWord(records, "展会总报告");
}

// 初始化
renderHistory();
</script>

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./index.html');
}
</script>

  'background_color':'#ffffff',
  'theme_color':'#3B82F6',
  'icons':[{'src':'https://picsum.photos/192','sizes':'192x192','type':'image/png'}]
}">
</body>
</html>
