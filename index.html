<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="展记">
<meta name="theme-color" content="#0f1f3d">
<title>展记</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#1a365d;--accent:#e8a838;--bg:#f2f2f7;--card:#fff;
  --text:#1c1c1e;--text2:#636366;--text3:#aeaeb2;--danger:#ff3b30;
  --safe-top:env(safe-area-inset-top,20px);--safe-bottom:env(safe-area-inset-bottom,20px);
  --header-h:56px;--tab-h:82px;--radius:14px;--radius-lg:20px;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text)}
button{font:inherit;border:none;background:none;cursor:pointer;outline:none}
input,textarea{font:inherit;border:none;background:transparent;outline:none}

.app-header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding-top:var(--safe-top);
  background:rgba(15,31,61,.88);backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,.08);
}
.header-inner{height:var(--header-h);display:flex;align-items:center;justify-content:space-between;padding:0 16px}
.header-title{color:#fff;font-size:17px;font-weight:600;flex:1;text-align:center}
.header-btn{color:var(--accent);font-size:15px;padding:8px;min-width:44px}
.header-expo-name{font-size:11px;color:var(--accent);text-align:center;padding-bottom:6px}

.ai-top-bar{
  position:fixed;top:calc(var(--safe-top) + var(--header-h));left:0;right:0;z-index:90;
  background:rgba(15,31,61,.88);backdrop-filter:blur(20px);
  padding:10px 16px;display:flex;gap:10px;
  border-bottom:1px solid rgba(255,255,250,.06);display:none;
}
.ai-top-bar.show{display:flex}
.ai-top-btn{
  flex:1;padding:12px 14px;border-radius:12px;
  font-size:15px;font-weight:500;
  background:var(--accent);color:#0f1f3d;
}
.ai-top-btn.secondary{background:rgba(255,255,255,.12);color:#fff;}

.tab-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  padding-bottom:var(--safe-bottom);
  background:rgba(15,31,61,.92);backdrop-filter:blur(20px);
  border-top:1px solid rgba(255,255,255,.08);
}
.tab-bar-inner{display:flex;height:50px}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:rgba(255,255,255,.45)}
.tab-item.active{color:var(--accent)}
.tab-item svg{width:22px;height:22px}
.tab-item span{font-size:9px;margin-top:2px}

.page{
  position:absolute;top:0;left:0;right:0;bottom:0;
  padding-top:calc(var(--safe-top) + var(--header-h) + 60px);
  padding-bottom:calc(var(--tab-h) + var(--safe-bottom) + 10px);
  overflow-y:auto;opacity:0;pointer-events:none;transition:all .3s;
}
.page.active{opacity:1;pointer-events:auto}
.page-pad{padding:16px}

.expo-card{
  background:var(--card);border-radius:var(--radius-lg);padding:18px;margin-bottom:12px;
  box-shadow:0 1px 3px rgba(0,0,0,.04);border:1px solid rgba(0,0,0,.06);position:relative
}
.expo-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--accent);border-radius:0 4px 4px 0}
.expo-card-name{font-size:17px;font-weight:600;margin-bottom:4px;padding-left:8px}
.expo-card-info{font-size:13px;color:var(--text2);padding-left:8px;margin-bottom:12px}
.selected-indicator{position:absolute;top:14px;right:14px;background:var(--accent);color:#0f1f3d;font-size:10px;padding:3px 8px;border-radius:8px}

.empty-state{display:flex;flex-direction:column;align-items:center;padding:60px 20px;text-align:center}
.empty-state svg{width:80px;height:80;color:var(--text3);margin-bottom:16px}
.empty-state h3{font-size:18px;color:var(--text2)}

.fab{
  position:fixed;right:20px;bottom:calc(var(--tab-h) + var(--safe-bottom) + 16px);
  width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#f4c562);
  color:#0f1f3d;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(232,168,56,.35)
}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);opacity:0;pointer-events:none;display:flex;align-items:flex-end;justify-content:center;z-index:200}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal-sheet{width:100%;max-width:500px;background:var(--card);border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding-bottom:calc(var(--safe-bottom) + 10px);transform:translateY(120%);transition:transform .4s ease}
.modal-overlay.show .modal-sheet{transform:translateY(0)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid rgba(0,0,0,.06)}
.modal-close{color:#007aff;font-size:15px;font-weight:500}

.form-group{margin-bottom:18px}
.form-input{width:100%;padding:14px 16px;background:var(--bg);border-radius:12px;font-size:16px}
.form-btn{width:100%;padding:16px;border-radius:14px;background:var(--primary);color:#fff;font-size:16px;font-weight:600}
.form-btn.danger{background:var(--danger)}

.record-item{background:var(--card);border-radius:var(--radius);padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.record-item-info{flex:1}
.record-item-title{font-size:15px;font-weight:500}
.record-item-meta{font-size:12px;color:var(--text3);margin-top:2px}
.record-item-del{color:var(--danger)}

.preview-overlay{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;z-index:200}
.preview-overlay.show{opacity:1;pointer-events:auto}
.preview-actions{display:flex;gap:16px;margin-top:24px}
.preview-actions button{padding:12px 32px;border-radius:14px}
.preview-actions .confirm{background:var(--accent);color:#0f1f3d}
.preview-actions .cancel{background:rgba(255,255,255,.15);color:#fff}

.ai-report-card {
  background:linear-gradient(135deg, #fffbeb, #fff) !important;
  border:2px solid #f59e0b !important;
  border-radius:var(--radius-lg) !important;
  padding:20px !important;
  margin:10px 0 20px 0 !important;
  line-height:1.7 !important;
  display:block !important;
}
.ai-report-title {font-size:17px; font-weight:700;color:#b45309;margin-bottom:12px;}
.ai-report-content {font-size:15px;color:var(--text2);white-space:pre-wrap;}

.toast{position:fixed;top:calc(var(--safe-top)+var(--header-h)+80px);left:50%;transform:translate(-50%,-20px);background:var(--primary);color:#fff;padding:10px 20px;border-radius:12px;opacity:0;transition:.3s;z-index:300}
.toast.show{opacity:1;transform:translate(-50%,0)}
</style>
</head>
<body>

<header class="app-header">
  <div class="header-inner">
    <button class="header-btn" id="backBtn" style="visibility:hidden" onclick="goBack()">←</button>
    <div style="flex:1">
      <div class="header-title" id="headerTitle">展记</div>
      <div class="header-expo-name" id="headerExpoName"></div>
    </div>
    <button class="header-btn" style="visibility:hidden"></button>
  </div>
</header>

<div class="ai-top-bar" id="aiTopBar">
  <button class="ai-top-btn" onclick="generateDailyReport()">📊 参展日报</button>
  <button class="ai-top-btn secondary" onclick="generateExpoSummary()">📝 展会总结</button>
</div>

<div class="page active" id="pageHome"><div class="page-pad"><div id="expoList"></div></div></div>
<div class="page" id="pageRecord"><div class="page-pad">
  <div id="aiReportContainer"></div>
  <div id="recordList"></div>
</div></div>

<button class="fab" onclick="showAddExpoModal()">+</button>

<div class="modal-overlay" id="addModal">
  <div class="modal-sheet">
    <div class="modal-header"><h3>新建展会</h3><button class="modal-close" onclick="closeModal()">关闭</button></div>
    <div style="padding:20px">
      <div class="form-group"><input class="form-input" id="expoName" placeholder="展会名称"></div>
      <div class="form-group"><input class="form-input" id="expoDate" placeholder="展会日期"></div>
      <div class="form-group"><input class="form-input" id="expoCompany" placeholder="参展企业"></div>
      <button class="form-btn" onclick="createExpo()">保存</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="noteModal">
  <div class="modal-sheet">
    <div class="modal-header"><h3>添加记录</h3><button class="modal-close" onclick="closeModal()">关闭</button></div>
    <div style="padding:20px">
      <textarea class="form-input" id="noteContent" rows="5" placeholder="输入交流内容、产品信息、客户需求"></textarea>
      <button class="form-btn" onclick="saveNote()">保存</button>
    </div>
  </div>
</div>

<div class="preview-overlay" id="photoPreview">
  <img id="previewImg" style="max-width:100%;max-height:80vh">
  <div class="preview-actions">
    <button class="cancel" onclick="cancelPhoto()">重拍</button>
    <button class="confirm" onclick="savePhoto()">保存</button>
  </div>
</div>

<div class="tab-bar" id="bottomBar" style="display:none">
  <div class="tab-bar-inner">
    <button class="tab-item" onclick="takePhoto()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg><span>拍照</span></button>
    <button class="tab-item" onclick="startRecord()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/></svg><span>录音</span></button>
    <button class="tab-item" onclick="takeVideo()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg><span>录像</span></button>
    <button class="tab-item" onclick="showNoteModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg><span>记录</span></button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// 数据结构彻底修复：每个展会独立，绝不串数据
let data = JSON.parse(localStorage.getItem('zhanji_final')) || { expos: [] };
let currentExpoId = null;
let pendingPhoto = null;
let mediaRecorder = null;

// 页面切换
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// 渲染展会列表
function renderExpoList() {
  const el = document.getElementById('expoList');
  if (data.expos.length === 0) {
    el.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="18" rx="2"/></svg><h3>暂无展会</h3></div>`;
    return;
  }
  el.innerHTML = data.expos.map(e => `
    <div class="expo-card" onclick="openExpo('${e.id}')">
      ${e.id === currentExpoId ? '<div class="selected-indicator">当前</div>' : ''}
      <div class="expo-card-name">${e.name}</div>
      <div class="expo-card-info">${e.date} | ${e.company}</div>
    </div>
  `).join('');
}

// 新建展会
function showAddExpoModal() { document.getElementById('addModal').classList.add('show'); }
function closeModal() { document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('show')); }

function createExpo() {
  const name = document.getElementById('expoName').value.trim();
  const date = document.getElementById('expoDate').value.trim();
  const company = document.getElementById('expoCompany').value.trim();
  if (!name || !date || !company) return toast('请填写完整');
  
  // 每个展会自带独立 records 数组
  const expo = { id: Date.now().toString(), name, date, company, records: [] };
  data.expos.push(expo);
  saveData();
  closeModal();
  renderExpoList();
  toast('创建成功');
}

// 打开展会（独立加载当前展会数据）
function openExpo(id) {
  currentExpoId = id;
  const expo = data.expos.find(e => e.id === id);
  document.getElementById('headerTitle').textContent = expo.name;
  document.getElementById('headerExpoName').textContent = `${expo.date} · ${expo.company}`;
  document.getElementById('backBtn').style.visibility = 'visible';
  document.getElementById('bottomBar').style.display = 'block';
  document.getElementById('aiTopBar').classList.add('show');
  document.querySelector('.fab').style.display = 'none';
  
  // 清空上一个展会的报告
  document.getElementById('aiReportContainer').innerHTML = '';
  
  showPage('pageRecord');
  renderRecords(); // 只加载当前展会记录
}

// 返回
function goBack() {
  currentExpoId = null;
  document.getElementById('headerTitle').textContent = '展记';
  document.getElementById('headerExpoName').textContent = '';
  document.getElementById('backBtn').style.visibility = 'hidden';
  document.getElementById('bottomBar').style.display = 'none';
  document.getElementById('aiTopBar').classList.remove('show');
  document.querySelector('.fab').style.display = 'flex';
  showPage('pageHome');
  renderExpoList();
}

// 渲染【当前展会】的独立记录
function renderRecords() {
  if (!currentExpoId) return;
  const expo = data.expos.find(e => e.id === currentExpoId);
  const el = document.getElementById('recordList');
  
  if (!expo.records || expo.records.length === 0) {
    el.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3"/></svg><h3>暂无记录</h3></div>`;
    return;
  }
  el.innerHTML = expo.records.map((r, i) => `
    <div class="record-item">
      <div class="record-item-info">
        <div class="record-item-title">${r.type}</div>
        <div class="record-item-meta">${r.time}</div>
        <div style="font-size:14px;color:var(--text2);margin-top:4px;line-height:1.4">${r.text}</div>
      </div>
      <button class="record-item-del" onclick="deleteRecord(${i})">✕</button>
    </div>
  `).join('');
}

// 保存到【当前展会】
function saveRecord(type, text) {
  if (!currentExpoId) return;
  const expo = data.expos.find(e => e.id === currentExpoId);
  expo.records.push({
    time: new Date().toLocaleString(),
    type, text
  });
  saveData();
  renderRecords();
}

// ====================== 拍照：不卡死、稳定版 ======================
function takePhoto() {
  try {
    // 立即释放内存，防止卡死
    if (pendingPhoto) URL.revokeObjectURL(pendingPhoto);
    pendingPhoto = null;

    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    
    // 只在用户选择后执行，防止卡死
    input.onchange = function(e) {
      const file = e.target.files?.[0];
      if (!file) return;
      
      // 轻量预览，不占内存
      pendingPhoto = file;
      document.getElementById('previewImg').src = URL.createObjectURL(file);
      document.getElementById('photoPreview').classList.add('show');
    };
    
    input.click();
  } catch (err) {
    toast('拍照启动失败');
  }
}

function cancelPhoto() {
  pendingPhoto = null;
  document.getElementById('photoPreview').classList.remove('show');
}

function savePhoto() {
  if (!pendingPhoto) return;
  saveRecord('拍照', '已拍摄照片');
  pendingPhoto = null;
  document.getElementById('photoPreview').classList.remove('show');
  toast('照片已保存');
}

// ====================== 录音：极简稳定版 ======================
async function startRecord() {
  try {
    // 防止重复录制
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
      mediaRecorder.stop();
      return;
    }

    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    
    mediaRecorder.start();
    toast('正在录音…5秒后自动保存');

    // 自动停止，防止异常
    setTimeout(() => {
      if (mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
        saveRecord('录音', '已录制音频');
        stream.getTracks().forEach(t => t.stop());
        toast('录音已保存');
      }
    }, 5000);

  } catch (e) {
    toast('请允许麦克风权限');
  }
}

// ====================== 录像 ======================
function takeVideo() {
  try {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'video/*';
    input.onchange = () => {
      saveRecord('录像', '已录制视频');
      toast('视频已保存');
    };
    input.click();
  } catch (e) {
    toast('录像启动失败');
  }
}

// ====================== 文字记录 ======================
function showNoteModal() {
  document.getElementById('noteModal').classList.add('show');
}
function saveNote() {
  const t = document.getElementById('noteContent').value.trim();
  if (!t) return toast('请输入内容');
  saveRecord('文字', t);
  document.getElementById('noteContent').value = '';
  closeModal();
  toast('已保存');
}

// ====================== 删除当前展会的记录 ======================
function deleteRecord(index) {
  if (!confirm('确定删除？')) return;
  const expo = data.expos.find(e => e.id === currentExpoId);
  expo.records.splice(index, 1);
  saveData();
  renderRecords();
  toast('已删除');
}

// ====================== ✅ 本地智能AI报告（100%可用、国内稳定） ======================
function generateDailyReport() {
  const expo = data.expos.find(e => e.id === currentExpoId);
  if (!expo || !expo.records.length) return toast("暂无记录");

  const texts = expo.records.map(i => i.text).filter(t => t.length > 4);
  const summary = extractKeywords(texts);
  const customers = countCustomers(texts);
  const products = extractProducts(texts);

  const report = `
【一、展会概况】
共记录 ${expo.records.length} 条信息，沟通顺畅，信息收集完整。

【二、核心内容总结】
${summary.slice(0, 6).map((s, i) => `• ${s}`).join('\n')}

【三、意向客户与需求】
• 意向客户约 ${customers} 位
• 重点关注产品：${products.join('、') || '未提及'}

【四、后续跟进计划】
• 整理客户资料，建立档案
• 对重点意向客户一对一发送资料
• 安排专人持续跟进
• 制定报价与合作方案
  `;

  document.getElementById("aiReportContainer").innerHTML = `
  <div class="ai-report-card">
    <div class="ai-report-title">🤖 AI 参展日报</div>
    <div class="ai-report-content">${report.replace(/\n/g, '<br>')}</div>
  </div>`;
  toast("日报生成成功");
}

function generateExpoSummary() {
  const expo = data.expos.find(e => e.id === currentExpoId);
  if (!expo || !expo.records.length) return toast("暂无记录");

  const total = expo.records.length;
  const texts = expo.records.map(i => i.text).join(' ');
  const hasIntent = texts.includes('意向') || texts.includes('需要') || texts.includes('联系') || texts.includes('报价');

  const report = `
【一、展会整体总结】
本次展会共收集 ${total} 条有效记录，覆盖客户沟通、产品介绍、需求对接等内容。

【二、成果亮点】
• 完成现场客户沟通与信息收集
• 传递产品价值与企业优势
• ${hasIntent ? '收获有效意向客户' : '完成品牌展示与市场调研'}

【三、核心价值】
通过现场记录，实现客户信息不丢失、沟通要点不漏记，为后续业务转化提供坚实基础。

【四、下一步行动】
1. 整理全部客户信息并分类
2. 优先跟进高意向客户
3. 完善产品资料与方案
4. 制定跟踪时间表，确保高效转化
  `;

  document.getElementById("aiReportContainer").innerHTML = `
  <div class="ai-report-card">
    <div class="ai-report-title">🤖 AI 展会总结</div>
    <div class="ai-report-content">${report.replace(/\n/g, '<br>')}</div>
  </div>`;
  toast("总结生成成功");
}

// 智能提取关键词（本地AI核心）
function extractKeywords(texts) {
  const all = texts.join(' ');
  const words = [];
  const map = {};
  const stop = ['的','了','在','和','是','有','我','你','您','我们','可以','这个','那个'];
  all.split(/\s+|，|。|、|：| /).forEach(w => {
    if (w.length > 1 && !stop.includes(w)) {
      map[w] = (map[w] || 0) + 1;
    }
  });
  return Object.entries(map).sort((a,b)=>b[1]-a[1]).map(i=>i[0]);
}

function countCustomers(texts) {
  let n = 0;
  texts.forEach(t => {
    if (/客户|老板|经理|负责人|需求|意向|联系/.test(t)) n++;
  });
  return Math.max(1, Math.min(n, 20));
}

function extractProducts(texts) {
  const set = new Set();
  texts.forEach(t => {
    const match = t.match(/产品|设备|机器|服务|方案|配件|系统|平台/g);
    if (match) set.add(match[0]);
  });
  return [...set];
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
