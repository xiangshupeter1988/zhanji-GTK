<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="展记">
<meta name="theme-color" content="#0f1f3d">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="展记">
<title>展记 — 参展记录工具</title>
<style>
/* === RESET & BASE === */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#1a365d;--primary-light:#2a4a7f;--primary-dark:#0f1f3d;
  --accent:#e8a838;--accent-glow:#f4c562;
  --bg:#f2f2f7;--card:#ffffff;--card-border:rgba(0,0,0,.06);
  --text:#1c1c1e;--text2:#636366;--text3:#aeaeb2;
  --danger:#ff3b30;--success:#34c759;--blue:#007aff;
  --glass:rgba(255,255,255,.72);--glass-border:rgba(255,255,255,.35);
  --safe-top:env(safe-area-inset-top,20px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --tab-h:82px;--header-h:56px;
  --radius:14px;--radius-lg:20px;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%}
body{position:relative}
button{font:inherit;border:none;background:none;cursor:pointer;-webkit-appearance:none}
input,textarea,select{font:inherit;border:none;outline:none;-webkit-appearance:none;background:transparent}
img,video{display:block;max-width:100%}

/* === HEADER === */
.app-header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding-top:var(--safe-top);
  background:rgba(15,31,61,.88);
  backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:1px solid rgba(255,255,255,.08);
}
.header-inner{
  height:var(--header-h);display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;
}
.header-title{color:#fff;font-size:17px;font-weight:600;letter-spacing:-.2px;flex:1;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-btn{color:var(--accent);font-size:15px;font-weight:500;padding:8px;min-width:44px;display:flex;align-items:center;justify-content:center}
.header-btn svg{width:22px;height:22px}
.header-badge{
  display:inline-block;background:var(--accent);color:var(--primary-dark);
  font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;
  margin-left:4px;vertical-align:middle;
}
.header-expo-name{
  font-size:11px;color:var(--accent);opacity:.9;
  display:block;text-align:center;padding-bottom:6px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.header-expo-name:empty{display:none;padding:0}

/* === TAB BAR === */
.tab-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  padding-bottom:var(--safe-bottom);
  background:rgba(15,31,61,.92);
  backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
  border-top:1px solid rgba(255,255,255,.08);
}
.tab-bar-inner{display:flex;height:50px;align-items:stretch}
.tab-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  color:rgba(255,255,255,.45);transition:color .2s;position:relative;
}
.tab-item.active{color:var(--accent)}
.tab-item svg{width:24px;height:24px;transition:transform .2s}
.tab-item.active svg{transform:scale(1.08)}
.tab-item span{font-size:10px;font-weight:500;letter-spacing:.1px}

/* === PAGES === */
.page-container{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  overflow:hidden;
}
.page{
  position:absolute;top:0;left:0;right:0;bottom:0;
  padding-top:calc(var(--safe-top) + var(--header-h));
  padding-bottom:calc(var(--tab-h) + var(--safe-bottom));
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  opacity:0;pointer-events:none;
  transition:opacity .28s ease,transform .28s ease;
  transform:translateX(12px);
}
.page.active{opacity:1;pointer-events:auto;transform:translateX(0)}
.page-pad{padding:16px 16px 24px}

/* === EXPO LIST (HOME) === */
.expo-card{
  background:var(--card);border-radius:var(--radius-lg);
  padding:18px;margin-bottom:12px;
  box-shadow:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.03);
  border:1px solid var(--card-border);
  transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden;
}
.expo-card::before{
  content:'';position:absolute;top:0;left:0;width:4px;height:100%;
  background:linear-gradient(180deg,var(--accent),var(--primary-light));border-radius:0 4px 4px 0;
}
.expo-card:active{transform:scale(.98)}
.expo-card-name{font-size:17px;font-weight:600;margin-bottom:4px;padding-left:8px}
.expo-card-info{font-size:13px;color:var(--text2);padding-left:8px;margin-bottom:12px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.expo-card-stats{display:flex;gap:8px;padding-left:8px;flex-wrap:wrap}
.stat-chip{
  display:inline-flex;align-items:center;gap:4px;
  background:var(--bg);border-radius:8px;padding:4px 10px;
  font-size:12px;color:var(--text2);font-weight:500;
}
.stat-chip svg{width:14px;height:14px;opacity:.6}
.expo-card-actions{position:absolute;top:14px;right:14px;display:flex;gap:6px}
.expo-card-actions button{
  width:32px;height:32px;border-radius:50%;
  background:var(--bg);display:flex;align-items:center;justify-content:center;
}
.expo-card-actions button svg{width:16px;height:16px;color:var(--text2)}
.selected-indicator{
  position:absolute;top:14px;right:14px;
  background:var(--accent);color:var(--primary-dark);
  font-size:10px;font-weight:700;padding:3px 8px;border-radius:8px;
}

/* === EMPTY STATE === */
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 32px;text-align:center;
}
.empty-state svg{width:80px;height:80px;color:var(--text3);opacity:.5;margin-bottom:16px}
.empty-state h3{font-size:18px;font-weight:600;color:var(--text2);margin-bottom:8px}
.empty-state p{font-size:14px;color:var(--text3);line-height:1.5;max-width:260px}

/* === MODAL === */
.modal-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.4);
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  opacity:0;pointer-events:none;transition:opacity .25s;
  display:flex;align-items:flex-end;justify-content:center;
}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal-sheet{
  width:100%;max-width:500px;max-height:88vh;
  background:var(--card);border-radius:var(--radius-lg) var(--radius-lg) 0 0;
  transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);
  overflow:hidden;display:flex;flex-direction:column;
  padding-bottom:var(--safe-bottom);
}
.modal-overlay.show .modal-sheet{transform:translateY(0)}
.modal-handle{width:36px;height:5px;border-radius:3px;background:var(--text3);opacity:.3;margin:10px auto 0}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;border-bottom:1px solid var(--card-border)}
.modal-header h3{font-size:17px;font-weight:600}
.modal-body{flex:1;overflow-y:auto;padding:20px}
.modal-close{color:var(--blue);font-size:15px;font-weight:500;padding:4px 8px}

/* === FORM === */
.form-group{margin-bottom:18px}
.form-label{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.5px}
.form-input{
  width:100%;padding:12px 14px;
  background:var(--bg);border-radius:12px;
  font-size:16px;color:var(--text);
  border:1px solid transparent;transition:border .2s;
}
.form-input:focus{border-color:var(--accent)}
.form-input::placeholder{color:var(--text3)}
textarea.form-input{min-height:80px;resize:vertical;line-height:1.5}
.form-btn{
  width:100%;padding:14px;border-radius:14px;
  background:linear-gradient(135deg,var(--primary),var(--primary-light));
  color:#fff;font-size:16px;font-weight:600;
  letter-spacing:.2px;
  transition:opacity .2s,transform .15s;
}
.form-btn:active{opacity:.85;transform:scale(.98)}
.form-btn.danger{background:linear-gradient(135deg,var(--danger),#ff6259)}

/* === CAMERA / MEDIA PAGES === */
.media-viewport{
  position:relative;
  width:100%;aspect-ratio:3/4;max-height:55vh;
  background:#000;border-radius:var(--radius-lg);overflow:hidden;
  margin:0 auto 16px;
}
.media-viewport video,.media-viewport canvas,.media-viewport img{
  width:100%;height:100%;object-fit:cover;
}
.media-controls{display:flex;align-items:center;justify-content:center;gap:24px;padding:12px 0}
.capture-btn{
  width:72px;height:72px;border-radius:50%;
  border:4px solid #fff;background:rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;
  transition:transform .15s,background .2s;position:relative;
}
.capture-btn:active{transform:scale(.92)}
.capture-btn-inner{width:58px;height:58px;border-radius:50%;background:#fff;transition:all .2s}
.capture-btn.recording .capture-btn-inner{width:28px;height:28px;border-radius:8px;background:var(--danger)}
.media-ctrl-btn{
  width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;
  color:#fff;
}
.media-ctrl-btn svg{width:22px;height:22px}

/* === AUDIO RECORDER === */
.audio-recorder{display:flex;flex-direction:column;align-items:center;padding:40px 20px}
.audio-timer{font-size:52px;font-weight:200;letter-spacing:2px;color:var(--primary);margin-bottom:8px;font-variant-numeric:tabular-nums}
.audio-status{font-size:14px;color:var(--text2);margin-bottom:32px;font-weight:500}
.audio-wave{display:flex;align-items:center;gap:3px;height:60px;margin-bottom:32px}
.audio-wave-bar{
  width:4px;border-radius:2px;background:var(--accent);
  animation:wave 1s ease-in-out infinite;
  opacity:.3;height:20%;
}
.audio-wave.active .audio-wave-bar{opacity:1}
@keyframes wave{0%,100%{height:20%}50%{height:100%}}
.audio-controls{display:flex;align-items:center;gap:24px}

/* === RECORD LIST ITEMS === */
.record-item{
  background:var(--card);border-radius:var(--radius);
  padding:14px 16px;margin-bottom:10px;
  border:1px solid var(--card-border);
  box-shadow:0 1px 2px rgba(0,0,0,.03);
  display:flex;align-items:center;gap:12px;
}
.record-item-thumb{
  width:52px;height:52px;border-radius:10px;overflow:hidden;
  background:var(--bg);flex-shrink:0;display:flex;align-items:center;justify-content:center;
}
.record-item-thumb img,.record-item-thumb video{width:100%;height:100%;object-fit:cover}
.record-item-thumb svg{width:24px;height:24px;color:var(--text3)}
.record-item-info{flex:1;min-width:0}
.record-item-title{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.record-item-meta{font-size:12px;color:var(--text3);margin-top:2px}
.record-item-del{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:var(--danger);flex-shrink:0;
}
.record-item-del svg{width:18px;height:18px}

/* === CONTACT CARD === */
.contact-card{
  background:var(--card);border-radius:var(--radius-lg);
  padding:18px;margin-bottom:12px;
  border:1px solid var(--card-border);
  box-shadow:0 1px 3px rgba(0,0,0,.04);
}
.contact-card-header{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.contact-avatar{
  width:44px;height:44px;border-radius:50%;
  background:linear-gradient(135deg,var(--primary),var(--primary-light));
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:600;flex-shrink:0;
}
.contact-name{font-size:16px;font-weight:600}
.contact-company{font-size:13px;color:var(--text2)}
.contact-details{display:flex;flex-direction:column;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--card-border)}
.contact-detail{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2)}
.contact-detail svg{width:15px;height:15px;opacity:.5;flex-shrink:0}
.contact-notes{
  margin-top:10px;padding:10px 12px;
  background:var(--bg);border-radius:10px;
  font-size:13px;line-height:1.6;color:var(--text);
}
.contact-card-actions{display:flex;gap:8px;margin-top:12px}
.contact-card-actions button{
  flex:1;padding:8px;border-radius:10px;
  font-size:13px;font-weight:500;text-align:center;
}

/* === DETAIL PAGE === */
.detail-section{margin-bottom:24px}
.detail-section-title{font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;padding-left:4px}
.detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.detail-grid-item{aspect-ratio:1;border-radius:10px;overflow:hidden;background:var(--bg);position:relative}
.detail-grid-item img,.detail-grid-item video{width:100%;height:100%;object-fit:cover}
.detail-grid-item .play-badge{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.3);
}
.detail-grid-item .play-badge svg{width:32px;height:32px;color:#fff}

/* === EXPORT === */
.export-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:14px;border-radius:14px;
  background:linear-gradient(135deg,var(--accent),var(--accent-glow));
  color:var(--primary-dark);font-size:15px;font-weight:600;
  margin-top:8px;
}
.export-btn svg{width:20px;height:20px}

/* === PHOTO PREVIEW CONFIRM === */
.preview-overlay{
  position:fixed;inset:0;z-index:250;background:#000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.preview-overlay.show{opacity:1;pointer-events:auto}
.preview-overlay img,.preview-overlay video{max-width:100%;max-height:70vh;object-fit:contain;border-radius:12px}
.preview-actions{display:flex;gap:16px;margin-top:24px}
.preview-actions button{
  padding:12px 32px;border-radius:14px;font-size:15px;font-weight:600;
}
.preview-actions .confirm{background:var(--accent);color:var(--primary-dark)}
.preview-actions .cancel{background:rgba(255,255,255,.15);color:#fff}

/* === MISC === */
.fab{
  position:fixed;z-index:90;
  right:20px;bottom:calc(var(--tab-h) + var(--safe-bottom) + 16px);
  width:56px;height:56px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent-glow));
  color:var(--primary-dark);
  box-shadow:0 4px 16px rgba(232,168,56,.35);
  display:flex;align-items:center;justify-content:center;
  transition:transform .2s;
}
.fab:active{transform:scale(.9)}
.fab svg{width:26px;height:26px}
.toast{
  position:fixed;top:calc(var(--safe-top) + var(--header-h) + 12px);
  left:50%;transform:translateX(-50%) translateY(-20px);
  background:var(--primary);color:#fff;
  padding:10px 20px;border-radius:12px;
  font-size:14px;font-weight:500;
  opacity:0;transition:all .3s;z-index:300;
  pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:0 4px}
.section-header h2{font-size:22px;font-weight:700;letter-spacing:-.3px}

/* scrollbar */
.page::-webkit-scrollbar{display:none}
.modal-body::-webkit-scrollbar{display:none}

/* === TRANSCRIPT === */
.transcript-box{
  margin-top:12px;padding:12px;
  background:var(--bg);border-radius:12px;
  max-height:120px;overflow-y:auto;
  font-size:13px;line-height:1.6;color:var(--text);
  border:1px solid var(--card-border);
}
.transcript-box:empty::before{content:'语音识别中...';color:var(--text3)}
.transcript-box.idle:empty::before{content:'转写文本将在此显示';color:var(--text3)}
.transcript-badge{
  display:inline-flex;align-items:center;gap:3px;
  font-size:11px;color:var(--success);font-weight:500;
  margin-left:8px;
}
.transcript-badge svg{width:12px;height:12px}

/* === PHOTO STAR === */
.photo-star{
  position:absolute;top:6px;right:6px;z-index:5;
  width:28px;height:28px;border-radius:50%;
  background:rgba(0,0,0,.4);
  display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.6);transition:all .2s;
}
.photo-star.important{color:var(--accent);background:rgba(0,0,0,.6)}
.photo-star svg{width:16px;height:16px}
.photo-important{border:2px solid var(--accent)!important;box-shadow:0 0 8px rgba(232,168,56,.3)}

/* === EXPORT PROGRESS === */
.export-progress{
  position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,.6);backdrop-filter:blur(8px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:#fff;gap:16px;
}
.export-progress-spinner{
  width:48px;height:48px;border:3px solid rgba(255,255,255,.2);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.export-progress-text{font-size:15px;font-weight:500}

/* === RECORD TRANSCRIPT PREVIEW === */
.record-item-transcript{
  font-size:12px;color:var(--text2);
  margin-top:3px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  line-height:1.4;
}
.edit-transcript-btn{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:var(--blue);flex-shrink:0;
}
.edit-transcript-btn svg{width:16px;height:16px}

/* === SEARCH BAR === */
.search-bar{
  display:flex;align-items:center;gap:8px;
  background:var(--card);border-radius:12px;
  padding:10px 14px;margin-bottom:14px;
  border:1px solid var(--card-border);
  box-shadow:0 1px 3px rgba(0,0,0,.03);
}
.search-bar svg{width:18px;height:18px;color:var(--text3);flex-shrink:0}
.search-bar input{flex:1;font-size:15px;color:var(--text);background:none}
.search-bar input::placeholder{color:var(--text3)}
.search-bar button{color:var(--text3);padding:2px;flex-shrink:0}
.search-bar button svg{width:18px;height:18px}

/* === REALTIME DOT === */
.realtime-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--success);display:inline-block;
  margin-right:4px;vertical-align:middle;
  animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* === EXPO CARD CREATOR === */
.expo-card-creator{font-size:11px;color:var(--text3);padding-left:8px;margin-bottom:8px;display:flex;align-items:center;gap:4px}

/* === DASHBOARD STATS === */
.dash-stats{
  display:grid;grid-template-columns:repeat(2,1fr);gap:10px;
  margin-bottom:16px;
}
.dash-stat{
  background:var(--card);border-radius:14px;padding:14px;
  border:1px solid var(--card-border);text-align:center;
}
.dash-stat-num{font-size:28px;font-weight:700;color:var(--primary);line-height:1.2}
.dash-stat-label{font-size:11px;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}

/* === QUICK ACTION BAR === */
.quick-actions{
  display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;
  -webkit-overflow-scrolling:touch;padding-bottom:4px;
}
.quick-actions::-webkit-scrollbar{display:none}
.quick-action{
  flex-shrink:0;display:flex;align-items:center;gap:6px;
  padding:10px 16px;border-radius:12px;
  font-size:13px;font-weight:600;color:#fff;
  white-space:nowrap;
}
.quick-action svg{width:18px;height:18px}
.quick-action.qa-photo{background:linear-gradient(135deg,#007aff,#5856d6)}
.quick-action.qa-audio{background:linear-gradient(135deg,#ff9500,#ff3b30)}
.quick-action.qa-video{background:linear-gradient(135deg,#34c759,#30b0c7)}
.quick-action.qa-contact{background:linear-gradient(135deg,#af52de,#ff2d55)}

/* === NETWORK STATUS === */
.network-bar{
  position:fixed;top:0;left:0;right:0;z-index:600;
  background:#ff3b30;color:#fff;text-align:center;
  font-size:12px;font-weight:600;padding:2px 0;
  transform:translateY(-100%);transition:transform .3s;
}
.network-bar.show{transform:translateY(0)}
.network-bar.online{background:var(--success)}
</style>
</head>
<body>

<!-- NETWORK STATUS (only for info, no sync needed) -->

<script>
// ============================================================
// 展记 - 本地存储版本 (IndexedDB)
// 无需登录，所有数据保存在浏览器中
// ============================================================

// ============ 全局状态 ============
let currentTab = 'home';
let currentExpo = null;
let allExpos = [];

// 媒体相关
let photoStream = null, photoFacing = 'environment';
let audioRecorder = null, audioStream = null, audioChunks = [], audioState = 'idle', audioInterval = null, audioSeconds = 0;
let videoRecorder = null, videoStream = null, videoChunks = [], videoState = 'idle', videoInterval = null, videoSeconds = 0, videoFacing = 'environment';
let pendingPhotoBlob = null;
let audioSpeechRec = null, audioTranscript = '', videoSpeechRec = null, videoTranscript = '';

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

function createSpeechRec(onResult) {
  if (!SpeechRecognition) return null;
  const rec = new SpeechRecognition();
  rec.continuous = true; rec.interimResults = true; rec.lang = 'zh-CN';
  rec.onresult = e => {
    let final = '', interim = '';
    for (let i = 0; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    onResult(final, interim);
  };
  rec.onerror = () => {};
  rec.onend = function() { if (this._keepAlive) try { this.start() } catch(e) {} };
  return rec;
}

// ============ IndexedDB 封装 ============
const DB_NAME = 'ExpoRecorderDB';
const DB_VERSION = 1;
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    if (db) resolve(db);
    const request = indexedDB.open(DB_NAME, DB_VERSION);
    request.onerror = (e) => reject(e);
    request.onsuccess = (e) => {
      db = e.target.result;
      resolve(db);
    };
    request.onupgradeneeded = (e) => {
      const db = e.target.result;
      // 展会表
      if (!db.objectStoreNames.contains('expos')) {
        const expoStore = db.createObjectStore('expos', { keyPath: 'id', autoIncrement: true });
        expoStore.createIndex('name', 'name', { unique: false });
        expoStore.createIndex('date', 'date', { unique: false });
      }
      // 照片表
      if (!db.objectStoreNames.contains('photos')) {
        const photoStore = db.createObjectStore('photos', { keyPath: 'id', autoIncrement: true });
        photoStore.createIndex('expo_id', 'expo_id', { unique: false });
        photoStore.createIndex('important', 'important', { unique: false });
      }
      // 录音表
      if (!db.objectStoreNames.contains('audios')) {
        const audioStore = db.createObjectStore('audios', { keyPath: 'id', autoIncrement: true });
        audioStore.createIndex('expo_id', 'expo_id', { unique: false });
      }
      // 录像表
      if (!db.objectStoreNames.contains('videos')) {
        const videoStore = db.createObjectStore('videos', { keyPath: 'id', autoIncrement: true });
        videoStore.createIndex('expo_id', 'expo_id', { unique: false });
      }
      // 联系人表
      if (!db.objectStoreNames.contains('contacts')) {
        const contactStore = db.createObjectStore('contacts', { keyPath: 'id', autoIncrement: true });
        contactStore.createIndex('expo_id', 'expo_id', { unique: false });
      }
    };
  });
}

function dbGetAll(storeName) {
  return new Promise(async (resolve, reject) => {
    const database = await openDB();
    const tx = database.transaction(storeName, 'readonly');
    const store = tx.objectStore(storeName);
    const request = store.getAll();
    request.onsuccess = () => resolve(request.result || []);
    request.onerror = (e) => reject(e);
  });
}

function dbGetByExpo(storeName, expoId) {
  return new Promise(async (resolve, reject) => {
    const database = await openDB();
    const tx = database.transaction(storeName, 'readonly');
    const store = tx.objectStore(storeName);
    const index = store.index('expo_id');
    const request = index.getAll(expoId);
    request.onsuccess = () => resolve(request.result || []);
    request.onerror = (e) => reject(e);
  });
}

function dbInsert(storeName, data) {
  return new Promise(async (resolve, reject) => {
    const database = await openDB();
    const tx = database.transaction(storeName, 'readwrite');
    const store = tx.objectStore(storeName);
    const item = { ...data, created_at: new Date().toISOString() };
    const request = store.add(item);
    request.onsuccess = (e) => {
      resolve({ ...item, id: e.target.result });
    };
    request.onerror = (e) => reject(e);
  });
}

function dbUpdate(storeName, id, updates) {
  return new Promise(async (resolve, reject) => {
    const database = await openDB();
    const tx = database.transaction(storeName, 'readwrite');
    const store = tx.objectStore(storeName);
    const getReq = store.get(id);
    getReq.onsuccess = () => {
      const item = getReq.result;
      if (!item) { resolve(null); return; }
      const updated = { ...item, ...updates };
      const putReq = store.put(updated);
      putReq.onsuccess = () => resolve(updated);
      putReq.onerror = (e) => reject(e);
    };
    getReq.onerror = (e) => reject(e);
  });
}

function dbDelete(storeName, id) {
  return new Promise(async (resolve, reject) => {
    const database = await openDB();
    const tx = database.transaction(storeName, 'readwrite');
    const store = tx.objectStore(storeName);
    const request = store.delete(id);
    request.onsuccess = () => resolve();
    request.onerror = (e) => reject(e);
  });
}

// 存储 Blob 文件 (照片/音频/视频)
async function saveMediaBlob(blob, type) {
  return new Promise(async (resolve, reject) => {
    const database = await openDB();
    const tx = database.transaction(['media'], 'readwrite');
    if (!database.objectStoreNames.contains('media')) {
      database.close();
      // 升级版本添加 media 存储
      const newVersion = DB_VERSION + 1;
      const req = indexedDB.open(DB_NAME, newVersion);
      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('media')) {
          db.createObjectStore('media', { keyPath: 'id', autoIncrement: true });
        }
      };
      req.onsuccess = () => {
        saveMediaBlob(blob, type).then(resolve).catch(reject);
      };
      return;
    }
    const store = tx.objectStore('media');
    const id = Date.now() + '_' + Math.random();
    const record = { id, blob, type, created_at: new Date().toISOString() };
    const request = store.add(record);
    request.onsuccess = () => resolve(id);
    request.onerror = (e) => reject(e);
  });
}

async function getMediaBlob(mediaId) {
  const database = await openDB();
  const tx = database.transaction(['media'], 'readonly');
  const store = tx.objectStore('media');
  const request = store.get(mediaId);
  return new Promise((resolve, reject) => {
    request.onsuccess = () => {
      const record = request.result;
      if (record && record.blob) resolve(record.blob);
      else resolve(null);
    };
    request.onerror = (e) => reject(e);
  });
}

async function deleteMediaBlob(mediaId) {
  const database = await openDB();
  const tx = database.transaction(['media'], 'readwrite');
  const store = tx.objectStore('media');
  store.delete(mediaId);
  return new Promise((resolve) => { tx.oncomplete = resolve; });
}

function getMediaUrl(mediaId) {
  // 返回一个 blob URL 或对象 URL，动态生成
  return null; // 实际使用时会调用 getMediaBlob 然后 createObjectURL
}

// ============ 辅助函数 ============
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function fmtDuration(sec) { const m = Math.floor(sec / 60).toString().padStart(2, '0'); const s = (sec % 60).toString().padStart(2, '0'); return m + ':' + s; }
function fmtDate(ts) { return new Date(ts).toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }); }
function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ============ 展会相关 ============
async function loadExpos() {
  allExpos = await dbGetAll('expos');
  // 按创建时间倒序
  allExpos.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
  if (allExpos.length > 0 && !currentExpo) currentExpo = allExpos[0];
  renderHome();
  updateHeaderExpo();
}

async function renderHome() {
  const container = document.getElementById('expoListContainer');
  if (allExpos.length === 0) {
    container.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="18" rx="2"/><path d="M8 7h8M8 11h5"/></svg><h3>还没有展会记录</h3><p>点击右下角 + 按钮创建你的第一个展会</p></div>';
    return;
  }

  // 统计所有展会的各项数量
  const allPhotos = await dbGetAll('photos');
  const allAudios = await dbGetAll('audios');
  const allVideos = await dbGetAll('videos');
  const allContacts = await dbGetAll('contacts');

  // Dashboard
  let html = '<div class="dash-stats">' +
    '<div class="dash-stat"><div class="dash-stat-num">' + allExpos.length + '</div><div class="dash-stat-label">展会</div></div>' +
    '<div class="dash-stat"><div class="dash-stat-num">' + allContacts.length + '</div><div class="dash-stat-label">对话</div></div>' +
    '<div class="dash-stat"><div class="dash-stat-num">' + allPhotos.length + '</div><div class="dash-stat-label">照片</div></div>' +
    '<div class="dash-stat"><div class="dash-stat-num">' + (allAudios.filter(a => a.transcript && a.transcript.trim()).length + allVideos.filter(v => v.transcript && v.transcript.trim()).length) + '</div><div class="dash-stat-label">已转写</div></div>' +
    '</div>';

  // 快捷操作区
  if (currentExpo) {
    html += '<div class="quick-actions">' +
      '<button class="quick-action qa-photo" onclick="switchTab(\'photo\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>拍照</button>' +
      '<button class="quick-action qa-audio" onclick="switchTab(\'audio\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/></svg>录音</button>' +
      '<button class="quick-action qa-video" onclick="switchTab(\'video\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>录像</button>' +
      '<button class="quick-action qa-contact" onclick="switchTab(\'contact\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>对话</button>' +
      '</div>';
  }

  html += '<div class="section-header"><h2>展会列表</h2></div>';

  for (const ex of allExpos) {
    const sel = currentExpo && currentExpo.id === ex.id;
    const photoCount = allPhotos.filter(p => p.expo_id === ex.id).length;
    const audioCount = allAudios.filter(a => a.expo_id === ex.id).length;
    const videoCount = allVideos.filter(v => v.expo_id === ex.id).length;
    const contactCount = allContacts.filter(c => c.expo_id === ex.id).length;

    html += '<div class="expo-card" onclick="selectExpo(' + ex.id + ')">' +
      (sel ? '<div class="selected-indicator">当前</div>' : '') +
      '<div class="expo-card-name">' + esc(ex.name) + '</div>' +
      '<div class="expo-card-info"><span>' + (ex.date || '') + '</span>' + (ex.location ? '<span>\u00b7</span><span>' + esc(ex.location) + '</span>' : '') + '</div>' +
      '<div class="expo-card-stats">' +
        '<span class="stat-chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>' + photoCount + '</span>' +
        '<span class="stat-chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/></svg>' + audioCount + '</span>' +
        '<span class="stat-chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>' + videoCount + '</span>' +
        '<span class="stat-chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>' + contactCount + '</span>' +
      '</div></div>';
  }
  container.innerHTML = html;
}

function selectExpo(id) {
  currentExpo = allExpos.find(e => e.id === id) || null;
  updateHeaderExpo();
  showExpoDetail(id);
}

function updateHeaderExpo() {
  const el = document.getElementById('headerExpoName');
  el.textContent = currentExpo ? ('当前展会: ' + currentExpo.name) : '';
}

async function showExpoDetail(id) {
  const ex = allExpos.find(e => e.id === id); if (!ex) return;
  currentTab = 'detail';
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('pageDetail').classList.add('active');
  document.getElementById('headerTitle').textContent = ex.name;
  document.getElementById('headerExpoName').textContent = (ex.date || '') + (ex.location ? ' \u00b7 ' + ex.location : '');
  document.getElementById('headerLeft').style.visibility = 'visible';
  document.getElementById('homeFab').style.display = 'none';
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));

  const photos = await dbGetByExpo('photos', id);
  const audios = await dbGetByExpo('audios', id);
  const videos = await dbGetByExpo('videos', id);
  const contacts = await dbGetByExpo('contacts', id);

  let html = '';

  // 导出按钮和编辑删除按钮
  html += '<div class="detail-section">' +
    '<div style="display:flex;gap:8px;margin-bottom:16px">' +

    '</div>';

  // 照片
  html += '<div class="detail-section"><div class="detail-section-title">照片 (' + photos.length + ')</div>';
  if (photos.length > 0) {
    html += '<div class="detail-grid">';
    for (const p of photos) {
      const blob = await getMediaBlob(p.media_id);
      const url = blob ? URL.createObjectURL(blob) : '';
      const imp = p.important ? true : false;
      html += '<div class="detail-grid-item' + (imp ? ' photo-important' : '') + '" onclick="viewMedia(\'image\',\'' + p.id + '\')">' +

        '<button class="photo-star' + (imp ? ' important' : '') + '" onclick="event.stopPropagation();togglePhotoStarDetail(' + p.id + ',' + id + ')"><svg viewBox="0 0 24 24" fill="' + (imp ? 'currentColor' : 'none') + '" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></button>' +
      '</div>';
    }
    html += '</div>';
  } else html += '<div style="color:var(--text3);font-size:13px;padding:8px 0">暂无照片</div>';
  html += '</div>';

  // 录音
  html += '<div class="detail-section"><div class="detail-section-title">录音 (' + audios.length + ')</div>';
  for (const a of audios) {
    const hasT = a.transcript && a.transcript.trim();
    html += '<div class="record-item" onclick="playAudio(' + a.id + ')" style="flex-wrap:wrap">' +
      '<div class="record-item-thumb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/></svg></div>' +
      '<div class="record-item-info"><div class="record-item-title">录音 ' + fmtDuration(a.duration || 0) + (hasT ? '<span class="transcript-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>已转写</span>' : '') + '</div><div class="record-item-meta">' + fmtDate(a.created_at) + '</div>' + (hasT ? '<div class="record-item-transcript">' + esc(a.transcript) + '</div>' : '') + '</div>' +
    '</div>';
  }
  if (audios.length === 0) html += '<div style="color:var(--text3);font-size:13px;padding:8px 0">暂无录音</div>';
  html += '</div>';

  // 录像
  html += '<div class="detail-section"><div class="detail-section-title">录像 (' + videos.length + ')</div>';
  if (videos.length > 0) {
    html += '<div class="detail-grid">';
    for (const v of videos) {
      const blob = await getMediaBlob(v.media_id);
      const url = blob ? URL.createObjectURL(blob) : '';
      html += '<div class="detail-grid-item" onclick="viewMedia(\'video\',\'' + v.id + '\')">' +
        '<video src="' + url + '" muted></video>' +
        '<div class="play-badge"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg></div></div>';
    }
    html += '</div>';
  } else html += '<div style="color:var(--text3);font-size:13px;padding:8px 0">暂无录像</div>';
  html += '</div>';

  // 联系人
  html += '<div class="detail-section"><div class="detail-section-title">对话记录 (' + contacts.length + ')</div>';

  html += '</div>';

  document.getElementById('detailContent').innerHTML = html;
}

async function saveNewExpo() {
  const name = document.getElementById('expoName').value.trim();
  if (!name) { showToast('请输入展会名称'); return; }
  const newExpo = {
    name,
    date: document.getElementById('expoDate').value,
    location: document.getElementById('expoLocation').value.trim(),
    description: document.getElementById('expoDesc').value.trim()
  };
  const inserted = await dbInsert('expos', newExpo);

}

function showEditExpoModal(id) {
  const ex = allExpos.find(e => e.id === id); if (!ex) return;
  showModal('编辑展会',
    '<div class="form-group"><label class="form-label">展会名称</label><input class="form-input" id="editExpoName" value="' + esc(ex.name) + '"></div>' +
    '<div class="form-group"><label class="form-label">日期</label><input class="form-input" id="editExpoDate" type="date" value="' + (ex.date || '') + '"></div>' +

    '<button class="form-btn" onclick="saveEditExpo(' + id + ')">保存</button>'
  );
}

async function saveEditExpo(id) {
  const updated = await dbUpdate('expos', id, {
    name: document.getElementById('editExpoName').value.trim(),
    date: document.getElementById('editExpoDate').value,
    location: document.getElementById('editExpoLocation').value.trim(),
    description: document.getElementById('editExpoDesc').value.trim()
  });
  closeModal(); showToast('已保存');
  await loadExpos();
  if (currentExpo && currentExpo.id === id) currentExpo = updated || allExpos.find(e => e.id === id);
  showExpoDetail(id);
}

async function deleteExpo(id) {
  if (!confirm('确定删除该展会及所有相关记录？')) return;
  // 删除关联媒体
  const photos = await dbGetByExpo('photos', id);
  for (const p of photos) {
    if (p.media_id) await deleteMediaBlob(p.media_id);
    await dbDelete('photos', p.id);
  }
  const audios = await dbGetByExpo('audios', id);
  for (const a of audios) {
    if (a.media_id) await deleteMediaBlob(a.media_id);
    await dbDelete('audios', a.id);
  }
  const videos = await dbGetByExpo('videos', id);
  for (const v of videos) {
    if (v.media_id) await deleteMediaBlob(v.media_id);
    await dbDelete('videos', v.id);
  }
  const contacts = await dbGetByExpo('contacts', id);
  for (const c of contacts) await dbDelete('contacts', c.id);
  await dbDelete('expos', id);
  if (currentExpo && currentExpo.id === id) currentExpo = null;
  showToast('已删除');
  await loadExpos();
  goBack();
}

// 照片相关
async function startPhotoStream() {
  try {
    if (photoStream) stopPhotoStream();
    photoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: photoFacing, width: { ideal: 1920 }, height: { ideal: 1080 } }, audio: false });
    document.getElementById('photoPreview').srcObject = photoStream;
    renderPhotoList();
  } catch(e) { showToast('无法访问摄像头: ' + e.message); }
}

function stopPhotoStream() {
  if (photoStream) { photoStream.getTracks().forEach(t => t.stop()); photoStream = null; }
  document.getElementById('photoPreview').srcObject = null;
}

function switchPhotoCamera() {
  photoFacing = photoFacing === 'environment' ? 'user' : 'environment';
  startPhotoStream();
}

function takePhoto() {
  if (!photoStream) return;
  const video = document.getElementById('photoPreview');
  const canvas = document.getElementById('photoCanvas');
  canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  canvas.toBlob(blob => {
    pendingPhotoBlob = blob;
    document.getElementById('previewImage').src = URL.createObjectURL(blob);
    document.getElementById('previewOverlay').classList.add('show');
  }, 'image/jpeg', 0.92);
}

function cancelPreview() {
  pendingPhotoBlob = null;
  document.getElementById('previewOverlay').classList.remove('show');
}

async function confirmPhoto() {
  if (!pendingPhotoBlob || !currentExpo) return;
  const mediaId = await saveMediaBlob(pendingPhotoBlob, 'photo');
  await dbInsert('photos', {
    expo_id: currentExpo.id,
    media_id: mediaId,
    important: false
  });
  pendingPhotoBlob = null;
  document.getElementById('previewOverlay').classList.remove('show');
  showToast('照片已保存');
  renderPhotoList();
}

// 录音相关
function initAudioWave() {
  const w = document.getElementById('audioWave'); let html = '';
  for (let i = 0; i < 30; i++) {
    const d = (Math.random() * 0.8 + 0.2).toFixed(2);
    html += '<div class="audio-wave-bar" style="animation-delay:' + d + 's"></div>';
  }
  w.innerHTML = html;
}

async function toggleAudio() {
  if (audioState === 'idle') startAudioRecording();
  else stopAudioRecording();
}

async function startAudioRecording() {
  try {
    audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioRecorder = new MediaRecorder(audioStream);
    audioChunks = []; audioTranscript = '';
    document.getElementById('audioTranscript').textContent = '';
    document.getElementById('audioTranscript').classList.remove('idle');
    audioRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    audioRecorder.onstop = async () => {
      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      if (currentExpo) {
        const mediaId = await saveMediaBlob(blob, 'audio');
        await dbInsert('audios', {
          expo_id: currentExpo.id,
          media_id: mediaId,
          duration: audioSeconds,
          transcript: audioTranscript
        });
        showToast('录音已保存');
        renderAudioList();
      }
      audioStream.getTracks().forEach(t => t.stop());
      audioStream = null; audioRecorder = null; audioChunks = [];
    };
    audioRecorder.start(1000);
    audioSpeechRec = createSpeechRec((final, interim) => {
      audioTranscript = final;
      document.getElementById('audioTranscript').textContent = final + interim;
      document.getElementById('audioTranscript').scrollTop = 99999;
    });
    if (audioSpeechRec) { audioSpeechRec._keepAlive = true; try { audioSpeechRec.start() } catch(e) {} }
    audioState = 'recording'; audioSeconds = 0;
    document.getElementById('audioRecBtn').classList.add('recording');
    document.getElementById('audioPauseBtn').style.display = 'flex';
    document.getElementById('audioWave').classList.add('active');
    document.getElementById('audioStatus').textContent = '录音中...';
    audioInterval = setInterval(() => { audioSeconds++; document.getElementById('audioTimer').textContent = fmtDuration(audioSeconds); }, 1000);
  } catch(e) { showToast('无法访问麦克风: ' + e.message); }
}

function pauseAudio() {
  if (!audioRecorder) return;
  if (audioState === 'recording') {
    audioRecorder.pause(); audioState = 'paused';
    clearInterval(audioInterval);
    document.getElementById('audioStatus').textContent = '已暂停';
    document.getElementById('audioWave').classList.remove('active');
    document.getElementById('audioPauseBtn').innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
  } else if (audioState === 'paused') {
    audioRecorder.resume(); audioState = 'recording';
    document.getElementById('audioStatus').textContent = '录音中...';
    document.getElementById('audioWave').classList.add('active');
    document.getElementById('audioPauseBtn').innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>';
    audioInterval = setInterval(() => { audioSeconds++; document.getElementById('audioTimer').textContent = fmtDuration(audioSeconds); }, 1000);
  }
}

function stopAudioRecording() {
  if (audioRecorder && audioRecorder.state !== 'inactive') audioRecorder.stop();
  if (audioSpeechRec) { audioSpeechRec._keepAlive = false; try { audioSpeechRec.stop() } catch(e) {} audioSpeechRec = null; }
  clearInterval(audioInterval);
  audioState = 'idle'; audioSeconds = 0;
  document.getElementById('audioTimer').textContent = '00:00';
  document.getElementById('audioStatus').textContent = '点击开始录音';
  document.getElementById('audioRecBtn').classList.remove('recording');
  document.getElementById('audioPauseBtn').style.display = 'none';
  document.getElementById('audioWave').classList.remove('active');
  document.getElementById('audioTranscript').classList.add('idle');
}

async function renderAudioList() {
  if (!currentExpo) return;
  const audios = await dbGetByExpo('audios', currentExpo.id);
  const c = document.getElementById('audioList');
  if (audios.length === 0) { c.innerHTML = '<div style="text-align:center;color:var(--text3);font-size:13px;padding:16px 0">该展会暂无录音</div>'; return; }

      '<div class="record-item-info"><div class="record-item-title">录音 ' + fmtDuration(a.duration || 0) + (hasT ? '<span class="transcript-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>已转写</span>' : '') + '</div><div class="record-item-meta">' + fmtDate(a.created_at) + '</div>' + (hasT ? '<div class="record-item-transcript">' + esc(a.transcript) + '</div>' : '') + '</div>' +
      '<button class="edit-transcript-btn" onclick="event.stopPropagation();editTranscript(\'audios\',' + a.id + ')" title="编辑转写"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></button>' +
      '<button class="record-item-del" onclick="event.stopPropagation();deleteRecord(\'audios\',' + a.id + ')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>' +
    '</div>';
  }
  c.innerHTML = html;
}

async function playAudio(id) {
  const audios = await dbGetByExpo('audios', currentExpo.id);
  const a = audios.find(x => x.id === id); if (!a) return;
  const blob = await getMediaBlob(a.media_id);
  if (!blob) return;
  const url = URL.createObjectURL(blob);
  const overlay = document.getElementById('mediaViewOverlay');
  document.getElementById('mediaViewImg').style.display = 'none';
  document.getElementById('mediaViewVideo').style.display = 'none';
  const aud = document.getElementById('mediaViewAudio');
  aud.src = url; aud.style.display = 'block'; aud.play();
  overlay.classList.add('show');
}

// 录像相关
async function startVideoStream() {
  try {
    if (videoStream) stopVideoStream();
    videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: videoFacing, width: { ideal: 1920 }, height: { ideal: 1080 } }, audio: true });
    document.getElementById('videoPreview').srcObject = videoStream;
    renderVideoList();
  } catch(e) { showToast('无法访问摄像头: ' + e.message); }
}

function stopVideoStream() {
  if (videoStream) { videoStream.getTracks().forEach(t => t.stop()); videoStream = null; }
  document.getElementById('videoPreview').srcObject = null;
}

function switchVideoCamera() {
  videoFacing = videoFacing === 'environment' ? 'user' : 'environment';
  if (videoState !== 'idle') return;
  startVideoStream();
}

function toggleVideo() {
  if (videoState === 'idle') startVideoRecording();
  else stopVideoRecording();
}

function startVideoRecording() {
  if (!videoStream) return;
  try {
    videoRecorder = new MediaRecorder(videoStream, { mimeType: 'video/webm;codecs=vp8,opus' });
  } catch(e) {
    try { videoRecorder = new MediaRecorder(videoStream); } catch(e2) { showToast('不支持视频录制'); return; }
  }
  videoChunks = []; videoTranscript = '';
  document.getElementById('videoTranscript').textContent = '';
  document.getElementById('videoTranscript').classList.remove('idle');
  videoRecorder.ondataavailable = e => { if (e.data.size > 0) videoChunks.push(e.data); };
  videoRecorder.onstop = async () => {
    const blob = new Blob(videoChunks, { type: videoRecorder.mimeType || 'video/webm' });
    if (currentExpo) {
      const mediaId = await saveMediaBlob(blob, 'video');
      await dbInsert('videos', {
        expo_id: currentExpo.id,
        media_id: mediaId,
        duration: videoSeconds,
        transcript: videoTranscript
      });
      showToast('录像已保存');
      renderVideoList();
    }
    videoChunks = []; videoRecorder = null;
  };
  videoRecorder.start(1000);
  videoSpeechRec = createSpeechRec((final, interim) => {
    videoTranscript = final;
    document.getElementById('videoTranscript').textContent = final + interim;
    document.getElementById('videoTranscript').scrollTop = 99999;
  });
  if (videoSpeechRec) { videoSpeechRec._keepAlive = true; try { videoSpeechRec.start() } catch(e) {} }
  videoState = 'recording'; videoSeconds = 0;
  document.getElementById('videoRecBtn').classList.add('recording');
  document.getElementById('videoTimerDisplay').style.opacity = '1';
  videoInterval = setInterval(() => { videoSeconds++; document.getElementById('videoTimerDisplay').textContent = fmtDuration(videoSeconds); }, 1000);
}

function stopVideoRecording() {
  if (videoRecorder && videoRecorder.state !== 'inactive') videoRecorder.stop();
  if (videoSpeechRec) { videoSpeechRec._keepAlive = false; try { videoSpeechRec.stop() } catch(e) {} videoSpeechRec = null; }
  clearInterval(videoInterval);
  videoState = 'idle'; videoSeconds = 0;
  document.getElementById('videoRecBtn').classList.remove('recording');
  document.getElementById('videoTimerDisplay').style.opacity = '0';
  document.getElementById('videoTimerDisplay').textContent = '00:00';
  document.getElementById('videoTranscript').classList.add('idle');
}

async function renderVideoList() {
  if (!currentExpo) return;
  const videos = await dbGetByExpo('videos', currentExpo.id);
  const c = document.getElementById('videoList');
  if (videos.length === 0) { c.innerHTML = '<div style="text-align:center;color:var(--text3);font-size:13px;padding:16px 0">该展会暂无录像</div>'; return; }
  let html = '<div style="margin-top:8px;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px">录像列表 (' + videos.length + ')</div>';
  for (const v of videos) {
    const hasT = v.transcript && v.transcript.trim();
    html += '<div class="record-item" onclick="playVideo(' + v.id + ')" style="flex-wrap:wrap">' +
      '<div class="record-item-thumb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>' +
      '<div class="record-item-info"><div class="record-item-title">录像 ' + fmtDuration(v.duration || 0) + (hasT ? '<span class="transcript-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>已转写</span>' : '') + '</div><div class="record-item-meta">' + fmtDate(v.created_at) + '</div>' + (hasT ? '<div class="record-item-transcript">' + esc(v.transcript) + '</div>' : '') + '</div>' +
      '<button class="edit-transcript-btn" onclick="event.stopPropagation();editTranscript(\'videos\',' + v.id + ')" title="编辑转写"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></button>' +
      '<button class="record-item-del" onclick="event.stopPropagation();deleteRecord(\'videos\',' + v.id + ')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>' +
    '</div>';
  }
  c.innerHTML = html;
}

async function playVideo(id) {
  const videos = await dbGetByExpo('videos', currentExpo.id);
  const v = videos.find(x => x.id === id); if (!v) return;
  const blob = await getMediaBlob(v.media_id);
  if (!blob) return;
  const url = URL.createObjectURL(blob);
  const overlay = document.getElementById('mediaViewOverlay');
  document.getElementById('mediaViewImg').style.display = 'none';
  document.getElementById('mediaViewAudio').style.display = 'none';
  const vid = document.getElementById('mediaViewVideo');
  vid.src = url; vid.style.display = 'block'; vid.play();
  overlay.classList.add('show');
}

// 联系人相关
async function showNewContactModal() {
  showModal('新增对话记录',
    '<div class="form-group"><label class="form-label">姓名 *</label><input class="form-input" id="contactName" placeholder="对方姓名"></div>' +
    '<div class="form-group"><label class="form-label">公司</label><input class="form-input" id="contactCompany" placeholder="所属公司/机构"></div>' +
    '<div class="form-group"><label class="form-label">职位</label><input class="form-input" id="contactPosition" placeholder="职位/头衔"></div>' +
    '<div class="form-group"><label class="form-label">联系方式</label><input class="form-input" id="contactPhone" placeholder="电话/微信/邮箱"></div>' +
    '<div class="form-group"><label class="form-label">交流要点</label><textarea class="form-input" id="contactNotes" placeholder="交流内容、合作意向、关注点等" rows="4"></textarea></div>' +
    '<button class="form-btn" onclick="saveNewContact()">保存</button>'
  );
}

async function saveNewContact() {
  const name = document.getElementById('contactName').value.trim();
  if (!name) { showToast('请输入姓名'); return; }
  if (!currentExpo) { showToast('请先选择展会'); return; }
  await dbInsert('contacts', {
    expo_id: currentExpo.id,
    name,
    company: document.getElementById('contactCompany').value.trim(),
    position: document.getElementById('contactPosition').value.trim(),
    phone: document.getElementById('contactPhone').value.trim(),
    notes: document.getElementById('contactNotes').value.trim()
  });
  closeModal(); showToast('对话记录已保存');
  renderContactList();
}

async function renderContactList() {
  if (!currentExpo) return;
  const contacts = await dbGetByExpo('contacts', currentExpo.id);
  const c = document.getElementById('contactListContainer');
  if (contacts.length === 0) {
    c.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><h3>暂无对话记录</h3><p>点击右下角 + 按钮记录与展商/嘉宾的交流</p></div>';
    return;
  }
  let html = '<div class="section-header"><h2>对话记录</h2><span style="font-size:13px;color:var(--text3)">' + contacts.length + '条</span></div>';
  for (const ct of contacts) {
    html += renderContactCard(ct);
  }
  c.innerHTML = html;
}

// 通用删除记录
async function deleteRecord(table, id) {
  if (!confirm('确定删除？')) return;
  // 如果表有媒体文件，需删除
  if (table === 'photos' || table === 'audios' || table === 'videos') {
    const items = await dbGetAll(table);
    const item = items.find(x => x.id === id);
    if (item && item.media_id) await deleteMediaBlob(item.media_id);
  }
  await dbDelete(table, id);
  showToast('已删除');
  if (table === 'photos') renderPhotoList();
  else if (table === 'audios') renderAudioList();
  else if (table === 'videos') renderVideoList();
  else if (table === 'contacts') renderContactList();
}

// 编辑转写
async function editTranscript(table, id) {
  const items = await dbGetAll(table);
  const item = items.find(x => x.id === id); if (!item) return;
  showModal('编辑转写文本',
    '<div class="form-group"><label class="form-label">转写内容</label><textarea class="form-input" id="editTranscriptText" rows="8" placeholder="在此输入或编辑语音转写文本">' + esc(item.transcript || '') + '</textarea></div>' +
    '<button class="form-btn" onclick="saveTranscript(\'' + table + '\',' + id + ')">保存</button>'
  );
}
async function saveTranscript(table, id) {
  await dbUpdate(table, id, { transcript: document.getElementById('editTranscriptText').value });
  closeModal(); showToast('转写已更新');
  if (table === 'audios') renderAudioList();
  else if (table === 'videos') renderVideoList();
}

// 媒体预览
async function viewMedia(type, id) {
  const overlay = document.getElementById('mediaViewOverlay');
  document.getElementById('mediaViewImg').style.display = 'none';
  document.getElementById('mediaViewVideo').style.display = 'none';
  document.getElementById('mediaViewAudio').style.display = 'none';

  let blob = null;
  if (type === 'image') {
    const photos = await dbGetAll('photos');
    const p = photos.find(x => x.id === id);
    if (p) blob = await getMediaBlob(p.media_id);
    if (blob) {
      const url = URL.createObjectURL(blob);
      const img = document.getElementById('mediaViewImg');
      img.src = url; img.style.display = 'block';
    }
  } else if (type === 'video') {
    const videos = await dbGetAll('videos');
    const v = videos.find(x => x.id === id);
    if (v) blob = await getMediaBlob(v.media_id);
    if (blob) {
      const url = URL.createObjectURL(blob);
      const vid = document.getElementById('mediaViewVideo');
      vid.src = url; vid.style.display = 'block'; vid.play();
    }
  } else if (type === 'audio') {
    const audios = await dbGetAll('audios');
    const a = audios.find(x => x.id === id);
    if (a) blob = await getMediaBlob(a.media_id);
    if (blob) {
      const url = URL.createObjectURL(blob);
      const aud = document.getElementById('mediaViewAudio');
      aud.src = url; aud.style.display = 'block'; aud.play();
    }
  }
  if (blob) overlay.classList.add('show');
}

function closeMediaView() {
  const overlay = document.getElementById('mediaViewOverlay');
  overlay.classList.remove('show');
  document.getElementById('mediaViewVideo').pause();
  document.getElementById('mediaViewAudio').pause();
}

// 导出 Word (简化版，仅演示，实际导出可能需要 docx 库，但为了不引入额外依赖，这里简单实现导出文本)
// 原导出功能依赖 docx 库，为保持简洁，这里提供一个简单的纯文本导出，提醒用户可后续扩展
async function exportExpo(id) {
  const ex = allExpos.find(e => e.id === id); if (!ex) return;
  const photos = await dbGetByExpo('photos', id);
  const audios = await dbGetByExpo('audios', id);
  const videos = await dbGetByExpo('videos', id);
  const contacts = await dbGetByExpo('contacts', id);

  let content = `展会名称：${ex.name}\n`;
  if (ex.date) content += `日期：${ex.date}\n`;
  if (ex.location) content += `地点：${ex.location}\n`;
  if (ex.description) content += `描述：${ex.description}\n`;
  content += `\n照片数量：${photos.length}\n录音数量：${audios.length}\n录像数量：${videos.length}\n对话数量：${contacts.length}\n\n`;

  content += '===== 对话记录 =====\n';
  contacts.forEach(c => {
    content += `姓名：${c.name}\n`;
    if (c.company) content += `公司：${c.company}\n`;
    if (c.position) content += `职位：${c.position}\n`;
    if (c.phone) content += `联系方式：${c.phone}\n`;
    if (c.notes) content += `交流要点：${c.notes}\n`;
    content += '------------------------\n';
  });

  const blob = new Blob([content], { type: 'text/plain' });
  const link = document.createElement('a');
  const url = URL.createObjectURL(blob);
  link.href = url;
  link.download = `展会记录_${ex.name}.txt`;
  link.click();
  URL.revokeObjectURL(url);
  showToast('已导出为文本文件');
}

// ============ UI 辅助 ============
function showModal(title, html) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }

function goBack() {
  document.getElementById('headerLeft').style.visibility = 'hidden';
  document.getElementById('pageDetail').classList.remove('active');
  document.getElementById('pageHome').classList.add('active');
  document.getElementById('headerTitle').textContent = '展记';
  document.getElementById('homeFab').style.display = 'flex';
  currentTab = 'home';
  document.querySelectorAll('.tab-item').forEach(t => t.classList.toggle('active', t.dataset.tab === 'home'));
}

function filterExpos() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  document.getElementById('searchClear').style.display = q ? 'block' : 'none';
  const cards = document.querySelectorAll('.expo-card');
  cards.forEach(card => {
    const text = card.textContent.toLowerCase();
    card.style.display = text.includes(q) ? '' : 'none';
  });
}
function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').style.display = 'none';
  const cards = document.querySelectorAll('.expo-card');
  cards.forEach(card => card.style.display = '');
}

function switchTab(tab) {
  if (currentTab === tab) return;
  if (currentTab === 'photo') stopPhotoStream();
  if (currentTab === 'audio' && audioState !== 'idle') stopAudioRecording();
  if (currentTab === 'video' && videoState !== 'idle') stopVideoRecording();
  if (currentTab === 'video') stopVideoStream();

  document.querySelectorAll('.tab-item').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));

  currentTab = tab;
  const pageMap = { home: 'pageHome', photo: 'pagePhoto', audio: 'pageAudio', video: 'pageVideo', contact: 'pageContact' };
  document.getElementById(pageMap[tab]).classList.add('active');

  document.getElementById('homeFab').style.display = tab === 'home' ? 'flex' : 'none';

  document.getElementById('headerLeft').style.visibility = 'hidden';

  if (tab === 'home') {
    document.getElementById('headerTitle').textContent = '展记';
    renderHome();
  } else {
    if (!currentExpo) { showToast('请先选择或创建一个展会'); switchTab('home'); return; }
    document.getElementById('headerTitle').textContent = { photo: '拍照', audio: '录音', video: '录像', contact: '对话记录' }[tab];
    updateHeaderExpo();
    if (tab === 'photo') startPhotoStream();
    if (tab === 'audio') renderAudioList();
    if (tab === 'video') startVideoStream();
    if (tab === 'contact') renderContactList();
  }
  if (tab === 'contact') {
    document.getElementById('homeFab').style.display = 'flex';
    document.getElementById('homeFab').onclick = () => showNewContactModal();
  } else {
    document.getElementById('homeFab').onclick = () => showNewExpoModal();
  }
}

// 初始化
async function init() {
  await openDB();
  await loadExpos();
  initAudioWave();
  // 如果没有展会，创建一个示例
  if (allExpos.length === 0) {
    const sample = await dbInsert('expos', {
      name: '示例展会',
      date: new Date().toISOString().slice(0,10),
      location: '上海',
      description: '这是一个示例展会，你可以编辑或删除它。'
    });
    currentExpo = sample;
    await loadExpos();
  }
  updateHeaderExpo();
}

init();
