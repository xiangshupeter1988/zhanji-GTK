<style>
/* === RESET & BASE === */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#1a365d;--primary-light:#2a4a7f;--primary-dark:#0f1f3d;
  --accent:#e8a838;--accent-glow:#f4c562;
  --bg:#f2f2f7;--card:#ffffff;--card-border:rgba(0,0,0,.06);
  --text:#1c1c1e;--text2:#636366;--text3:#aeaeb2;
  --danger:#ff3b30;--success:#34c759;--blue:#007aff;
  --glass:rgba(255,255,255,.72);--glass-border:rgba(255,255,255,.35);
  --safe-top:env(safe-area-inset-top,20px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --tab-h:82px;--header-h:56px;
  --radius:14px;--radius-lg:20px;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%}
body{position:relative}
button{font:inherit;border:none;background:none;cursor:pointer;-webkit-appearance:none}
input,textarea,select{font:inherit;border:none;outline:none;-webkit-appearance:none;background:transparent}
img,video{display:block;max-width:100%}

/* === HEADER === */
.app-header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding-top:var(--safe-top);
  background:rgba(15,31,61,.88);
  backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:1px solid rgba(255,255,255,.08);
}
.header-inner{
  height:var(--header-h);display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;
}
.header-title{color:#fff;font-size:17px;font-weight:600;letter-spacing:-.2px;flex:1;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-btn{color:var(--accent);font-size:15px;font-weight:500;padding:8px;min-width:44px;display:flex;align-items:center;justify-content:center}
.header-btn svg{width:22px;height:22px}
.header-badge{
  display:inline-block;background:var(--accent);color:var(--primary-dark);
  font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;
  margin-left:4px;vertical-align:middle;
}
.header-expo-name{
  font-size:11px;color:var(--accent);opacity:.9;
  display:block;text-align:center;padding-bottom:6px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.header-expo-name:empty{display:none;padding:0}

/* === TAB BAR === */
.tab-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  padding-bottom:var(--safe-bottom);
  background:rgba(15,31,61,.92);
  backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
  border-top:1px solid rgba(255,255,255,.08);
}
.tab-bar-inner{display:flex;height:50px;align-items:stretch}
.tab-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  color:rgba(255,255,255,.45);transition:color .2s;position:relative;
}
.tab-item.active{color:var(--accent)}
.tab-item svg{width:24px;height:24px;transition:transform .2s}
.tab-item.active svg{transform:scale(1.08)}
.tab-item span{font-size:10px;font-weight:500;letter-spacing:.1px}

/* === PAGES === */
.page-container{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  overflow:hidden;
}
.page{
  position:absolute;top:0;left:0;right:0;bottom:0;
  padding-top:calc(var(--safe-top) + var(--header-h));
  padding-bottom:calc(var(--tab-h) + var(--safe-bottom));
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  opacity:0;pointer-events:none;
  transition:opacity .28s ease,transform .28s ease;
  transform:translateX(12px);
}
.page.active{opacity:1;pointer-events:auto;transform:translateX(0)}
.page-pad{padding:16px 16px 24px}

/* === EXPO LIST (HOME) === */
.expo-card{
  background:var(--card);border-radius:var(--radius-lg);
  padding:18px;margin-bottom:12px;
  box-shadow:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.03);
  border:1px solid var(--card-border);
  transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden;
}
.expo-card::before{
  content:'';position:absolute;top:0;left:0;width:4px;height:100%;
  background:linear-gradient(180deg,var(--accent),var(--primary-light));border-radius:0 4px 4px 0;
}
.expo-card:active{transform:scale(.98)}
.expo-card-name{font-size:17px;font-weight:600;margin-bottom:4px;padding-left:8px}
.expo-card-info{font-size:13px;color:var(--text2);padding-left:8px;margin-bottom:12px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.expo-card-stats{display:flex;gap:8px;padding-left:8px;flex-wrap:wrap}
.stat-chip{
  display:inline-flex;align-items:center;gap:4px;
  background:var(--bg);border-radius:8px;padding:4px 10px;
  font-size:12px;color:var(--text2);font-weight:500;
}
.stat-chip svg{width:14px;height:14px;opacity:.6}
.expo-card-actions{position:absolute;top:14px;right:14px;display:flex;gap:6px}
.expo-card-actions button{
  width:32px;height:32px;border-radius:50%;
  background:var(--bg);display:flex;align-items:center;justify-content:center;
}
.expo-card-actions button svg{width:16px;height:16px;color:var(--text2)}
.selected-indicator{
  position:absolute;top:14px;right:14px;
  background:var(--accent);color:var(--primary-dark);
  font-size:10px;font-weight:700;padding:3px 8px;border-radius:8px;
}

/* === EMPTY STATE === */
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 32px;text-align:center;
}
.empty-state svg{width:80px;height:80px;color:var(--text3);opacity:.5;margin-bottom:16px}
.empty-state h3{font-size:18px;font-weight:600;color:var(--text2);margin-bottom:8px}
.empty-state p{font-size:14px;color:var(--text3);line-height:1.5;max-width:260px}

/* === MODAL === */
.modal-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.4);
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  opacity:0;pointer-events:none;transition:opacity .25s;
  display:flex;align-items:flex-end;justify-content:center;
}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal-sheet{
  width:100%;max-width:500px;max-height:88vh;
  background:var(--card);border-radius:var(--radius-lg) var(--radius-lg) 0 0;
  transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);
  overflow:hidden;display:flex;flex-direction:column;
  padding-bottom:var(--safe-bottom);
}
.modal-overlay.show .modal-sheet{transform:translateY(0)}
.modal-handle{width:36px;height:5px;border-radius:3px;background:var(--text3);opacity:.3;margin:10px auto 0}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;border-bottom:1px solid var(--card-border)}
.modal-header h3{font-size:17px;font-weight:600}
.modal-body{flex:1;overflow-y:auto;padding:20px}
.modal-close{color:var(--blue);font-size:15px;font-weight:500;padding:4px 8px}

/* === FORM === */
.form-group{margin-bottom:18px}
.form-label{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.5px}
.form-input{
  width:100%;padding:12px 14px;
  background:var(--bg);border-radius:12px;
  font-size:16px;color:var(--text);
  border:1px solid transparent;transition:border .2s;
}
.form-input:focus{border-color:var(--accent)}
.form-input::placeholder{color:var(--text3)}
textarea.form-input{min-height:80px;resize:vertical;line-height:1.5}
.form-btn{
  width:100%;padding:14px;border-radius:14px;
  background:linear-gradient(135deg,var(--primary),var(--primary-light));
  color:#fff;font-size:16px;font-weight:600;
  letter-spacing:.2px;
  transition:opacity .2s,transform .15s;
}
.form-btn:active{opacity:.85;transform:scale(.98)}
.form-btn.danger{background:linear-gradient(135deg,var(--danger),#ff6259)}

/* === CAMERA / MEDIA PAGES === */
.media-viewport{
  position:relative;
  width:100%;aspect-ratio:3/4;max-height:55vh;
  background:#000;border-radius:var(--radius-lg);overflow:hidden;
  margin:0 auto 16px;
}
.media-viewport video,.media-viewport canvas,.media-viewport img{
  width:100%;height:100%;object-fit:cover;
}
.media-controls{display:flex;align-items:center;justify-content:center;gap:24px;padding:12px 0}
.capture-btn{
  width:72px;height:72px;border-radius:50%;
  border:4px solid #fff;background:rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;
  transition:transform .15s,background .2s;position:relative;
}
.capture-btn:active{transform:scale(.92)}
.capture-btn-inner{width:58px;height:58px;border-radius:50%;background:#fff;transition:all .2s}
.capture-btn.recording .capture-btn-inner{width:28px;height:28px;border-radius:8px;background:var(--danger)}
.media-ctrl-btn{
  width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;
  color:#fff;
}
.media-ctrl-btn svg{width:22px;height:22px}

/* === AUDIO RECORDER === */
.audio-recorder{display:flex;flex-direction:column;align-items:center;padding:40px 20px}
.audio-timer{font-size:52px;font-weight:200;letter-spacing:2px;color:var(--primary);margin-bottom:8px;font-variant-numeric:tabular-nums}
.audio-status{font-size:14px;color:var(--text2);margin-bottom:32px;font-weight:500}
.audio-wave{display:flex;align-items:center;gap:3px;height:60px;margin-bottom:32px}
.audio-wave-bar{
  width:4px;border-radius:2px;background:var(--accent);
  animation:wave 1s ease-in-out infinite;
  opacity:.3;height:20%;
}
.audio-wave.active .audio-wave-bar{opacity:1}
@keyframes wave{0%,100%{height:20%}50%{height:100%}}
.audio-controls{display:flex;align-items:center;gap:24px}

/* === RECORD LIST ITEMS === */
.record-item{
  background:var(--card);border-radius:var(--radius);
  padding:14px 16px;margin-bottom:10px;
  border:1px solid var(--card-border);
  box-shadow:0 1px 2px rgba(0,0,0,.03);
  display:flex;align-items:center;gap:12px;
}
.record-item-thumb{
  width:52px;height:52px;border-radius:10px;overflow:hidden;
  background:var(--bg);flex-shrink:0;display:flex;align-items:center;justify-content:center;
}
.record-item-thumb img,.record-item-thumb video{width:100%;height:100%;object-fit:cover}
.record-item-thumb svg{width:24px;height:24px;color:var(--text3)}
.record-item-info{flex:1;min-width:0}
.record-item-title{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.record-item-meta{font-size:12px;color:var(--text3);margin-top:2px}
.record-item-del{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:var(--danger);flex-shrink:0;
}
.record-item-del svg{width:18px;height:18px}

/* === CONTACT CARD === */
.contact-card{
  background:var(--card);border-radius:var(--radius-lg);
  padding:18px;margin-bottom:12px;
  border:1px solid var(--card-border);
  box-shadow:0 1px 3px rgba(0,0,0,.04);
}
.contact-card-header{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.contact-avatar{
  width:44px;height:44px;border-radius:50%;
  background:linear-gradient(135deg,var(--primary),var(--primary-light));
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:600;flex-shrink:0;
}
.contact-name{font-size:16px;font-weight:600}
.contact-company{font-size:13px;color:var(--text2)}
.contact-details{display:flex;flex-direction:column;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--card-border)}
.contact-detail{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2)}
.contact-detail svg{width:15px;height:15px;opacity:.5;flex-shrink:0}
.contact-notes{
  margin-top:10px;padding:10px 12px;
  background:var(--bg);border-radius:10px;
  font-size:13px;line-height:1.6;color:var(--text);
}
.contact-card-actions{display:flex;gap:8px;margin-top:12px}
.contact-card-actions button{
  flex:1;padding:8px;border-radius:10px;
  font-size:13px;font-weight:500;text-align:center;
}

/* === DETAIL PAGE === */
.detail-section{margin-bottom:24px}
.detail-section-title{font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;padding-left:4px}
.detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.detail-grid-item{aspect-ratio:1;border-radius:10px;overflow:hidden;background:var(--bg);position:relative}
.detail-grid-item img,.detail-grid-item video{width:100%;height:100%;object-fit:cover}
.detail-grid-item .play-badge{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.3);
}
.detail-grid-item .play-badge svg{width:32px;height:32px;color:#fff}

/* === EXPORT === */
.export-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:14px;border-radius:14px;
  background:linear-gradient(135deg,var(--accent),var(--accent-glow));
  color:var(--primary-dark);font-size:15px;font-weight:600;
  margin-top:8px;
}
.export-btn svg{width:20px;height:20px}

/* === PHOTO PREVIEW CONFIRM === */
.preview-overlay{
  position:fixed;inset:0;z-index:250;background:#000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.preview-overlay.show{opacity:1;pointer-events:auto}
.preview-overlay img,.preview-overlay video{max-width:100%;max-height:70vh;object-fit:contain;border-radius:12px}
.preview-actions{display:flex;gap:16px;margin-top:24px}
.preview-actions button{
  padding:12px 32px;border-radius:14px;font-size:15px;font-weight:600;
}
.preview-actions .confirm{background:var(--accent);color:var(--primary-dark)}
.preview-actions .cancel{background:rgba(255,255,255,.15);color:#fff}

/* === MISC === */
.fab{
  position:fixed;z-index:90;
  right:20px;bottom:calc(var(--tab-h) + var(--safe-bottom) + 16px);
  width:56px;height:56px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent-glow));
  color:var(--primary-dark);
  box-shadow:0 4px 16px rgba(232,168,56,.35);
  display:flex;align-items:center;justify-content:center;
  transition:transform .2s;
}
.fab:active{transform:scale(.9)}
.fab svg{width:26px;height:26px}
.toast{
  position:fixed;top:calc(var(--safe-top) + var(--header-h) + 12px);
  left:50%;transform:translateX(-50%) translateY(-20px);
  background:var(--primary);color:#fff;
  padding:10px 20px;border-radius:12px;
  font-size:14px;font-weight:500;
  opacity:0;transition:all .3s;z-index:300;
  pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:0 4px}
.section-header h2{font-size:22px;font-weight:700;letter-spacing:-.3px}

/* scrollbar */
.page::-webkit-scrollbar{display:none}
.modal-body::-webkit-scrollbar{display:none}

/* === TRANSCRIPT === */
.transcript-box{
  margin-top:12px;padding:12px;
  background:var(--bg);border-radius:12px;
  max-height:120px;overflow-y:auto;
  font-size:13px;line-height:1.6;color:var(--text);
  border:1px solid var(--card-border);
}
.transcript-box:empty::before{content:'语音识别中...';color:var(--text3)}
.transcript-box.idle:empty::before{content:'转写文本将在此显示';color:var(--text3)}
.transcript-badge{
  display:inline-flex;align-items:center;gap:3px;
  font-size:11px;color:var(--success);font-weight:500;
  margin-left:8px;
}
.transcript-badge svg{width:12px;height:12px}

/* === PHOTO STAR === */
.photo-star{
  position:absolute;top:6px;right:6px;z-index:5;
  width:28px;height:28px;border-radius:50%;
  background:rgba(0,0,0,.4);
  display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.6);transition:all .2s;
}
.photo-star.important{color:var(--accent);background:rgba(0,0,0,.6)}
.photo-star svg{width:16px;height:16px}
.photo-important{border:2px solid var(--accent)!important;box-shadow:0 0 8px rgba(232,168,56,.3)}

/* === EXPORT PROGRESS === */
.export-progress{
  position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,.6);backdrop-filter:blur(8px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:#fff;gap:16px;
}
.export-progress-spinner{
  width:48px;height:48px;border:3px solid rgba(255,255,255,.2);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.export-progress-text{font-size:15px;font-weight:500}

/* === RECORD TRANSCRIPT PREVIEW === */
.record-item-transcript{
  font-size:12px;color:var(--text2);
  margin-top:3px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  line-height:1.4;
}
.edit-transcript-btn{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:var(--blue);flex-shrink:0;
}
.edit-transcript-btn svg{width:16px;height:16px}

/* === SEARCH BAR === */
.search-bar{
  display:flex;align-items:center;gap:8px;
  background:var(--card);border-radius:12px;
  padding:10px 14px;margin-bottom:14px;
  border:1px solid var(--card-border);
  box-shadow:0 1px 3px rgba(0,0,0,.03);
}
.search-bar svg{width:18px;height:18px;color:var(--text3);flex-shrink:0}
.search-bar input{flex:1;font-size:15px;color:var(--text);background:none}
.search-bar input::placeholder{color:var(--text3)}
.search-bar button{color:var(--text3);padding:2px;flex-shrink:0}
.search-bar button svg{width:18px;height:18px}

/* === REALTIME DOT === */
.realtime-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--success);display:inline-block;
  margin-right:4px;vertical-align:middle;
  animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

<script>
// ============================================================
// 本地存储核心
// ============================================================
function getLocal(key) {
  try { return JSON.parse(localStorage.getItem('expoApp_' + key) || 'null') || []; }
  catch { return []; }
}
function setLocal(key, data) {
  localStorage.setItem('expoApp_' + key, JSON.stringify(data));
}

// 生成唯一ID
function uuid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,8);
}

// ============================================================
// 本地数据库方法
// ============================================================
async function dbGetAll(table) {
  return getLocal(table);
}
async function dbGetByExpo(table, expoId) {
  return getLocal(table).filter(item => item.expo_id === expoId);
}
async function dbInsert(table, data) {
  const list = getLocal(table);
  const row = { id: uuid(), created_at: new Date().toISOString(), ...data };
  list.unshift(row);
  setLocal(table, list);
  return row;
}
async function dbUpdate(table, id, updates) {
  const list = getLocal(table);
  const idx = list.findIndex(x => x.id === id);
  if (idx < 0) return null;
  list[idx] = { ...list[idx], ...updates };
  setLocal(table, list);
  return list[idx];
}
async function dbDelete(table, id) {
  let list = getLocal(table);
  list = list.filter(x => x.id !== id);
  setLocal(table, list);
}

// ============================================================
// 媒体本地存储（Base64）
// ============================================================
async function uploadMedia(blob, type, ext) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = () => {
      const key = `${type}_${uuid()}.${ext}`;
      localStorage.setItem('media_' + key, reader.result);
      resolve(key);
    };
    reader.readAsDataURL(blob);
  });
}
function getMediaUrl(filePath) {
  return localStorage.getItem('media_' + filePath) || '';
}
async function deleteMediaFile(filePath) {
  localStorage.removeItem('media_' + filePath);
}
async function fetchMediaBlob(filePath) {
  const dataURL = getMediaUrl(filePath);
  const res = await fetch(dataURL);
  return await res.blob();
}

// ============================================================
// 全局状态
// ============================================================
let currentTab = 'home';
let currentExpo = null;
let allExpos = [];

// 媒体流状态
let photoStream = null, photoFacing = 'environment';
let audioRecorder = null, audioStream = null, audioChunks = [], audioState = 'idle', audioInterval = null, audioSeconds = 0;
let videoRecorder = null, videoStream = null, videoChunks = [], videoState = 'idle', videoInterval = null, videoSeconds = 0, videoFacing = 'environment';
let pendingPhotoBlob = null;

// 语音识别
let audioSpeechRec = null, audioTranscript = '', videoSpeechRec = null, videoTranscript = '';
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

function createSpeechRec(onResult) {
  if (!SpeechRecognition) return null;
  const rec = new SpeechRecognition();
  rec.continuous = true; rec.interimResults = true; rec.lang = 'zh-CN';
  rec.onresult = e => {
    let final = '', interim = '';
    for (let i = 0; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    onResult(final, interim);
  };
  rec.onerror = () => {};
  rec.onend = function() { if (this._keepAlive) try { this.start() } catch(e) {} };
  return rec;
}

// ============================================================
// 初始化
// ============================================================
async function init() {
  allExpos = await dbGetAll('expos');
  if (allExpos.length > 0 && !currentExpo) currentExpo = allExpos[0];
  initAudioWave();
  renderHome();
  updateHeaderExpo();
}

window.addEventListener('DOMContentLoaded', init);

// ============================================================
// 标签页切换
// ============================================================
function switchTab(tab) {
  if (currentTab === tab) return;
  if (currentTab === 'photo') stopPhotoStream();
  if (currentTab === 'audio' && audioState !== 'idle') stopAudioRecording();
  if (currentTab === 'video' && videoState !== 'idle') stopVideoRecording();
  if (currentTab === 'video') stopVideoStream();

  document.querySelectorAll('.tab-item').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));

  currentTab = tab;
  const pageMap = { home: 'pageHome', photo: 'pagePhoto', audio: 'pageAudio', video: 'pageVideo', contact: 'pageContact' };
  document.getElementById(pageMap[tab]).classList.add('active');

  document.getElementById('homeFab').style.display = tab === 'home' ? 'flex' : 'none';
  const headerLeft = document.getElementById('headerLeft');
  headerLeft.style.visibility = 'hidden';

  if (tab === 'home') {
    document.getElementById('headerTitle').textContent = '展记';
    document.getElementById('headerRight').style.visibility = 'hidden';
    renderHome();
  } else {
    if (!currentExpo) { showToast('请先选择或创建一个展会'); switchTab('home'); return; }
    document.getElementById('headerTitle').textContent = { photo: '拍照', audio: '录音', video: '录像', contact: '对话记录' }[tab];
    updateHeaderExpo();
    if (tab === 'photo') { startPhotoStream(); renderPhotoList(); }
    if (tab === 'audio') renderAudioList();
    if (tab === 'video') { startVideoStream(); renderVideoList(); }
    if (tab === 'contact') renderContactList();
  }
  if (tab === 'contact') {
    document.getElementById('homeFab').style.display = 'flex';
    document.getElementById('homeFab').onclick = () => showNewContactModal();
  } else {
    document.getElementById('homeFab').onclick = () => showNewExpoModal();
  }
}

// ============================================================
// 头部 & 返回
// ============================================================
function updateHeaderExpo() {
  const el = document.getElementById('headerExpoName');
  el.textContent = currentExpo ? ('当前展会: ' + currentExpo.name) : '';
}
function goBack() {
  document.getElementById('headerLeft').style.visibility = 'hidden';
  document.getElementById('headerRight').style.visibility = 'hidden';
  document.getElementById('pageDetail').classList.remove('active');
  document.getElementById('pageHome').classList.add('active');
  document.getElementById('headerTitle').textContent = '展记';
  document.getElementById('homeFab').style.display = 'flex';
  currentTab = 'home';
  document.querySelectorAll('.tab-item').forEach(t => t.classList.toggle('active', t.dataset.tab === 'home'));
}

// ============================================================
// 提示框
// ============================================================
function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ============================================================
// 模态框
// ============================================================
function showModal(title, html) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('show') }

// ============================================================
// 搜索
// ============================================================
function filterExpos() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  document.getElementById('searchClear').style.display = q ? 'block' : 'none';
  const cards = document.querySelectorAll('.expo-card');
  cards.forEach(card => {
    const text = card.textContent.toLowerCase();
    card.style.display = text.includes(q) ? '' : 'none';
  });
}
function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').style.display = 'none';
  document.querySelectorAll('.expo-card').forEach(card => card.style.display = '');
}

// ============================================================
// 首页 & 展会列表（仅保留列表）
// ============================================================
async function renderHome() {
  allExpos = await dbGetAll('expos');
  const c = document.getElementById('expoListContainer');
  if (allExpos.length === 0) {
    c.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="18" rx="2"/><path d="M8 7h8M8 11h5"/></svg><h3>还没有展会记录</h3><p>点击右下角 + 按钮创建你的第一个展会</p></div>';
    return;
  }

  let html = '<div class="section-header"><h2>展会列表</h2></div>';
  const photos = await dbGetAll('photos'), audios = await dbGetAll('audios'), videos = await dbGetAll('videos'), contacts = await dbGetAll('contacts');
  const count = (arr, eid) => arr.filter(r => r.expo_id === eid).length;

  for (const ex of allExpos) {
    const sel = currentExpo && currentExpo.id === ex.id;
    const pc = count(photos, ex.id), ac = count(audios, ex.id), vc = count(videos, ex.id), cc = count(contacts, ex.id);
    html += '<div class="expo-card" onclick="selectExpo(\'' + ex.id + '\')">' +
      (sel ? '<div class="selected-indicator">当前</div>' : '') +
      '<div class="expo-card-name">' + esc(ex.name) + '</div>' +
      '<div class="expo-card-info"><span>' + (ex.date || '') + '</span>' + (ex.location ? '<span>·</span><span>' + esc(ex.location) + '</span>' : '') + '</div>' +
      '<div class="expo-card-stats">' +
        '<span class="stat-chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>' + pc + '</span>' +
        '<span class="stat-chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/></svg>' + ac + '</span>' +
        '<span class="stat-chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>' + vc + '</span>' +
        '<span class="stat-chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>' + cc + '</span>' +
      '</div></div>';
  }
  c.innerHTML = html;
}

function selectExpo(id) {
  currentExpo = allExpos.find(e => e.id === id) || null;
  updateHeaderExpo();
  // 切换展会后，刷新所有媒体页面
  if(currentTab === 'photo') renderPhotoList();
  if(currentTab === 'audio') renderAudioList();
  if(currentTab === 'video') renderVideoList();
  if(currentTab === 'contact') renderContactList();
  showExpoDetail(id);
}

// ============================================================
// 导出选择弹窗
// ============================================================
function showExportModal(expoId) {
  showModal('选择导出类型',
    '<button class="form-btn" style="margin-bottom:12px" onclick="exportDailyReport(\''+ expoId +'\')">📝 观展日报</button>'+
    '<button class="form-btn" onclick="exportSummaryReport(\''+ expoId +'\')">📊 展会总结报告</button>'
  );
}

// ============================================================
// 展会详情
// ============================================================
async function showExpoDetail(id) {
  const ex = allExpos.find(e => e.id === id); if (!ex) return;
  currentTab = 'detail';
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('pageDetail').classList.add('active');
  document.getElementById('headerTitle').textContent = ex.name;
  document.getElementById('headerExpoName').textContent = (ex.date || '') + (ex.location ? ' · ' + ex.location : '');
  document.getElementById('headerLeft').style.visibility = 'visible';
  document.getElementById('homeFab').style.display = 'none';
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));

  const photos = await dbGetByExpo('photos', id);
  const audios = await dbGetByExpo('audios', id);
  const videos = await dbGetByExpo('videos', id);
  const contacts = await dbGetByExpo('contacts', id);

  let html = '';
  html += '<div class="detail-section">' +
    '<button class="export-btn" onclick="showExportModal(\'' + id + '\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>导出Word报告</button>' +
    '<div style="display:flex;gap:8px;margin-top:8px">' +
      '<button class="form-btn" style="flex:1;font-size:13px;padding:10px" onclick="showEditExpoModal(\'' + id + '\')">编辑展会</button>' +
      '<button class="form-btn danger" style="flex:1;font-size:13px;padding:10px" onclick="deleteExpo(\'' + id + '\')">删除展会</button>' +
    '</div></div>';

  if (ex.description) html += '<div class="detail-section"><div class="contact-notes">' + esc(ex.description) + '</div></div>';

  // 照片
  html += '<div class="detail-section"><div class="detail-section-title">照片 (' + photos.length + ')</div>';
  if (photos.length > 0) {
    html += '<div class="detail-grid">';
    photos.forEach(p => {
      const url = getMediaUrl(p.file_path);
      const imp = p.important;
      html += '<div class="detail-grid-item' + (imp ? ' photo-important' : '') + '" onclick="viewMedia(\'image\',\'' + p.id + '\')">' +

    '</div>';
  });
  if (audios.length === 0) html += '<div style="color:var(--text3);font-size:13px;padding:8px 0">暂无录音</div>';
  html += '</div>';

  // 录像
  html += '<div class="detail-section"><div class="detail-section-title">录像 (' + videos.length + ')</div>';
  if (videos.length > 0) {
    html += '<div class="detail-grid">';
    videos.forEach(v => {
      const url = getMediaUrl(v.file_path);
      html += '<div class="detail-grid-item" onclick="viewMedia(\'video\',\'' + v.id + '\')">' +
        '<video src="' + url + '" muted></video>' +
        '<div class="play-badge"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg></div></div>';
    });
    html += '</div>';
  } else html += '<div style="color:var(--text3);font-size:13px;padding:8px 0">暂无录像</div>';
  html += '</div>';

  // 联系人
  html += '<div class="detail-section"><div class="detail-section-title">对话记录 (' + contacts.length + ')</div>';
  contacts.forEach(ct => { html += renderContactCard(ct); });
  if (contacts.length === 0) html += '<div style="color:var(--text3);font-size:13px;padding:8px 0">暂无对话记录</div>';
  html += '</div>';

  document.getElementById('detailContent').innerHTML = html;
}

function initAudioWave() {
  const w = document.getElementById('audioWave');
  for (let i=0;i<30;i++) w.innerHTML += '<div class="audio-wave-bar" style="animation-delay:'+(Math.random()*.8+.2).toFixed(2)+'s"></div>';
}
async function toggleAudio() { audioState === 'idle' ? startAudioRecording() : stopAudioRecording(); }
async function startAudioRecording() {
  audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  audioRecorder = new MediaRecorder(audioStream); audioChunks = []; audioTranscript = '';
  document.getElementById('audioTranscript').textContent = ''; document.getElementById('audioTranscript').classList.remove('idle');
  audioRecorder.ondataavailable = e => e.data.size && audioChunks.push(e.data);
  audioRecorder.onstop = async () => {
    const blob = new Blob(audioChunks,{type:'audio/webm'});
    const path = await uploadMedia(blob,'audio','webm');
    await dbInsert('audios', { expo_id:currentExpo.id, file_path:path, duration:audioSeconds, transcript:audioTranscript });
    showToast('录音已保存'); renderAudioList();
    audioStream.getTracks().forEach(t=>t.stop());
  };
  audioRecorder.start(1000);
  audioSpeechRec = createSpeechRec((f,i)=>{ audioTranscript=f; document.getElementById('audioTranscript').textContent=f+i; });
  if(audioSpeechRec){ audioSpeechRec._keepAlive=1; audioSpeechRec.start(); }
  audioState='recording'; audioSeconds=0;
  document.getElementById('audioRecBtn').classList.add('recording');
  document.getElementById('audioPauseBtn').style.display='flex';
  document.getElementById('audioWave').classList.add('active');
  document.getElementById('audioStatus').textContent='录音中...';
  audioInterval=setInterval(()=>{ audioSeconds++; document.getElementById('audioTimer').textContent=fmtDuration(audioSeconds); },1000);
}
function pauseAudio() {
  if(audioState==='recording'){ audioRecorder.pause(); audioState='paused'; clearInterval(audioInterval);
    document.getElementById('audioStatus').textContent='已暂停'; document.getElementById('audioWave').classList.remove('active');
    document.getElementById('audioPauseBtn').innerHTML='<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
  }else{ audioRecorder.resume(); audioState='recording';
    document.getElementById('audioStatus').textContent='录音中...'; document.getElementById('audioWave').classList.add('active');
    document.getElementById('audioPauseBtn').innerHTML='<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>';
    audioInterval=setInterval(()=>{ audioSeconds++; document.getElementById('audioTimer').textContent=fmtDuration(audioSeconds); },1000);
  }
}
function stopAudioRecording() {
  if(audioRecorder && audioRecorder.state!=='inactive') audioRecorder.stop();
  if(audioSpeechRec){ audioSpeechRec._keepAlive=0; audioSpeechRec.stop(); }
  clearInterval(audioInterval); audioState='idle';
  document.getElementById('audioTimer').textContent='00:00'; document.getElementById('audioStatus').textContent='点击开始录音';
  document.getElementById('audioRecBtn').classList.remove('recording'); document.getElementById('audioPauseBtn').style.display='none';
  document.getElementById('audioWave').classList.remove('active'); document.getElementById('audioTranscript').classList.add('idle');
}
async function renderAudioList() {
  if(!currentExpo)return;
  const list=await dbGetByExpo('audios',currentExpo.id);
  const c=document.getElementById('audioList');
  if(list.length===0){ c.innerHTML='<div style="text-align:center;color:var(--text3);padding:16px">暂无录音</div>'; return; }
  let html='<div style="margin-top:16px;font-size:13px;color:var(--text2)">录音列表 '+list.length+'</div>';

      '<div class="record-item-info"><div class="record-item-title">录音 '+fmtDuration(a.duration||0)+(hasT?'<span class="transcript-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>已转写</span>':'')+'</div><div class="record-item-meta">'+fmtDate(a.created_at)+'</div>'+(hasT?'<div class="record-item-transcript">'+esc(a.transcript)+'</div>':'')+'</div>' +

  if(item?.file_path)await deleteMediaFile(item.file_path);
  await dbDelete(table,id);showToast('已删除');
  if(type==='photo')renderPhotoList();else if(type==='audio')renderAudioList();else if(type==='video')renderVideoList();else renderContactList();
}

function showExportProgress(m){let e=document.createElement('div');e.id='exportProgress';e.className='export-progress';e.innerHTML='<div class="export-progress-spinner"></div><div class="export-progress-text">'+m+'</div>';document.body.appendChild(e);}
function hideExportProgress(){const e=document.getElementById('exportProgress');if(e)e.remove();}
function blobToArrayBuffer(b){return new Promise(r=>{const f=new FileReader();f.onload=()=>r(f.result);f.readAsArrayBuffer(b);});}
const STOP_WORDS=new Set('的了是在我有和就不人都一个上也这到说要会可以你那我们他她它为对从而与被让给把比更很已所又或者之其如果因为但是然而虽然如何什么怎么哪里什么时候为什么可能应该需要能够这个那个这些那些自己他们我们你们大家没有不是已经正在可以还是以及关于通过进行表示'.split(''));
function extractKeywords(t){const s=t.join(' ').replace(/[，。！？、；：""''（）\s\n]/g,' ').split(/\s+/).filter(w=>w.length>=2&&w.length<=8&&!STOP_WORDS.has(w));const f={};s.forEach(w=>f[w]=(f[w]||0)+1);return Object.entries(f).sort((a,b)=>b[1]-a[1]).slice(0,15);}

// ============================================================
// 导出：观展日报（时间线流水）
// ============================================================
async function exportDailyReport(id) {
  const ex = allExpos.find(e => e.id === id);
  if (!ex) return;
  showExportProgress('正在生成观展日报...');

  const photos = await dbGetByExpo('photos', id);
  const audios = await dbGetByExpo('audios', id);
  const videos = await dbGetByExpo('videos', id);
  const contacts = await dbGetByExpo('contacts', id);

  const timeline = [];
  photos.forEach(p => timeline.push({ type: 'photo', data: p, time: new Date(p.created_at).getTime() }));
  audios.forEach(a => timeline.push({ type: 'audio', data: a, time: new Date(a.created_at).getTime() }));
  videos.forEach(v => timeline.push({ type: 'video', data: v, time: new Date(v.created_at).getTime() }));
  contacts.forEach(c => timeline.push({ type: 'contact', data: c, time: new Date(c.created_at).getTime() }));
  timeline.sort((a, b) => a.time - b.time);

  const { Document, Packer, Paragraph, TextRun, HeadingLevel, AlignmentType, ImageRun } = docx;

  const doc = new Document({
    sections: [{
      children: [
        new Paragraph({ alignment: AlignmentType.CENTER, children: [new TextRun({ text: "观展日报", size: 44, bold: true })] }),
        new Paragraph({ alignment: AlignmentType.CENTER, children: [new TextRun({ text: ex.name, size: 28 })] }),
        new Paragraph({ alignment: AlignmentType.CENTER, children: [new TextRun({ text: new Date().toLocaleDateString(), size: 24 })] }),
        new Paragraph({ text: "" }),
      ]
    }]
  });

  for (const item of timeline) {
    if (item.type === 'photo') {
      const blob = await fetchMediaBlob(item.data.file_path);
      const buf = await blobToArrayBuffer(blob);
      doc.addSection({ children: [new Paragraph({ children: [new ImageRun({ data: buf, width: 300 })] })] });
    }
    if (item.type === 'audio') {
      const t = item.data.transcript || '无转写';
      doc.addSection({ children: [new Paragraph(`【录音】${fmtDate(item.data.created_at)}`)] });
      doc.addSection({ children: [new Paragraph(t)] });
    }
    if (item.type === 'video') {
      const t = item.data.transcript || '无转写';
      doc.addSection({ children: [new Paragraph(`【录像】${fmtDate(item.data.created_at)}`)] });
      doc.addSection({ children: [new Paragraph(t)] });
    }
    if (item.type === 'contact') {
      const c = item.data;
      doc.addSection({ children: [new Paragraph(`【交流】${c.name} | ${c.company || ''} | ${c.phone || ''}`)] });
      doc.addSection({ children: [new Paragraph(c.notes || '无记录')] });
    }
  }

  const blob = await Packer.toBlob(doc);
  saveAs(blob, `观展日报_${ex.name}.docx`);
  hideExportProgress();
  showToast('观展日报导出成功');
  closeModal();
}

// ============================================================
// 导出：展会总结报告（结构化正式版）
// ============================================================
async function exportSummaryReport(id) {
  const ex = allExpos.find(e => e.id === id);
  if (!ex) return;
  showExportProgress('正在生成展会总结报告...');

  const photos = await dbGetByExpo('photos', id);
  const audios = await dbGetByExpo('audios', id);
  const videos = await dbGetByExpo('videos', id);
  const contacts = await dbGetByExpo('contacts', id);
  const importantPhotos = photos.filter(x => x.important);

  const { Document, Packer, Paragraph, TextRun, HeadingLevel, AlignmentType, ImageRun } = docx;

  const doc = new Document({
    sections: [{
      children: [
        new Paragraph({ alignment: AlignmentType.CENTER, children: [new TextRun({ text: "展会总结报告", size: 48, bold: true })] }),
        new Paragraph({ alignment: AlignmentType.CENTER, children: [new TextRun({ text: ex.name, size: 32 })] }),
        new Paragraph({ text: "" }),
        new Paragraph({ children: [new TextRun({ text: "展会基本信息", size: 32, bold: true })] }),
        new Paragraph(`展会名称：${ex.name}`),
        new Paragraph(`展会时间：${ex.date || '未填写'}`),
        new Paragraph(`展会地点：${ex.location || '未填写'}`),
        new Paragraph(`展会描述：${ex.description || '无'}`),
        new Paragraph({ text: "" }),
      ]
    }]
  });

  // 重点照片
  doc.addSection({ children: [new Paragraph({ children: [new TextRun({ text: "重点照片", size: 32, bold: true })] })] });
  for (const p of importantPhotos.slice(0, 10)) {
    const blob = await fetchMediaBlob(p.file_path);
    const buf = await blobToArrayBuffer(blob);
    doc.addSection({ children: [new Paragraph({ children: [new ImageRun({ data: buf, width: 250 })] })] });
  }

  // 交流记录
  doc.addSection({ children: [new Paragraph({ text: "" }), new Paragraph({ children: [new TextRun({ text: "交流记录", size: 32, bold: true })] })] });
  contacts.forEach(c => {
    doc.addSection({ children: [new Paragraph(`● ${c.name} - ${c.company || ''}（${c.phone || ''}）`)] });
    doc.addSection({ children: [new Paragraph(c.notes || '无')] });
  });

  // 音视频转写
  doc.addSection({ children: [new Paragraph({ text: "" }), new Paragraph({ children: [new TextRun({ text: "音视频记录", size: 32, bold: true })] })] });
  audios.forEach(a => a.transcript && doc.addSection({ children: [new Paragraph(`● 录音：${a.transcript}`)] }));
  videos.forEach(v => v.transcript && doc.addSection({ children: [new Paragraph(`● 录像：${v.transcript}`)] }));

  const blob = await Packer.toBlob(doc);
  saveAs(blob, `展会总结报告_${ex.name}.docx`);
  hideExportProgress();
  showToast('总结报告导出成功');
  closeModal();
}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function fmtDuration(s){const m=Math.floor(s/60).toString().padStart(2,'0');const s2=(s%60).toString().padStart(2,'0');return m+':'+s2;}
function fmtDate(t){return new Date(t).toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});}
